<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#dceeff">
  <title>和美智慧校園｜專案計畫中心</title>
  <style>
    :root{
      --primary:#4f86c6;--primary-dark:#356ba9;--text:#23364d;--muted:#6d7d90;
      --line:#d9e7f3;--soft:#f5f9fd;--success:#2f9d69;--warning:#d89a33;
      --danger:#d95757;--shadow:0 10px 28px rgba(49,91,133,.13)
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#eaf5ff,#f8fbff);color:var(--text);min-height:100vh}
    button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{width:min(980px,100%);margin:auto;padding:18px 14px 48px}
    .topbar,.panel{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
    .topbar{border-radius:28px;padding:18px;margin-bottom:16px}
    .brand{display:flex;align-items:center;gap:14px}
    .logo{width:72px;height:72px;border-radius:20px;object-fit:contain;background:#fff;padding:4px;box-shadow:0 5px 14px rgba(49,91,133,.16)}
    h1{font-size:1.55rem;margin:0;color:var(--primary-dark)}
    .subtitle{color:var(--muted);font-size:.95rem;margin-top:5px;line-height:1.55}
    .status{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .pill{border-radius:999px;padding:7px 11px;background:#f4f8fc;border:1px solid var(--line);color:var(--muted);font-size:.84rem;font-weight:800}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:15px}
    .summary-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px;text-align:center;box-shadow:0 7px 20px rgba(49,91,133,.08)}
    .summary-card strong{display:block;color:var(--primary-dark);font-size:1.7rem}.summary-card span{color:var(--muted);font-weight:800;font-size:.85rem}
    .panel{border-radius:24px;margin-bottom:15px;overflow:hidden}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:15px 17px;border-bottom:1px solid var(--line)}
    .panel-head h2{margin:0;color:var(--primary-dark);font-size:1.15rem}
    .panel-body{padding:16px}
    .toolbar{display:flex;gap:9px;flex-wrap:wrap}
    .primary,.secondary,.danger,.success{border:0;border-radius:12px;padding:10px 14px;font-weight:900}
    .primary{background:var(--primary);color:#fff}.secondary{background:#eaf3fb;color:var(--primary-dark)}
    .danger{background:#fff0f0;color:var(--danger)}.success{background:#e9f7f0;color:#247c55}
    .filter-row{display:grid;grid-template-columns:1fr 180px 180px;gap:10px}
    input,select,textarea{width:100%;border:1px solid #cdddeb;border-radius:12px;padding:11px 12px;background:#fff;color:var(--text)}
    textarea{min-height:85px;resize:vertical}
    .project-list{display:grid;gap:11px}
    .project-card{border:1px solid var(--line);border-radius:18px;padding:15px;background:#fff;display:grid;grid-template-columns:1fr auto;gap:15px;align-items:center}
    .project-card.archived{background:#f7f9fb;opacity:.9}
    .project-name{font-size:1.14rem;font-weight:950;color:var(--primary-dark)}
    .project-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px;color:var(--muted);font-size:.86rem;font-weight:800}
    .tag{display:inline-block;border-radius:999px;padding:5px 9px;background:#edf4fb;color:var(--primary-dark);font-size:.78rem;font-weight:900}
    .tag.orange{background:#fff2dc;color:#a56200}.tag.red{background:#ffe6e6;color:#b93838}.tag.gray{background:#eceff2;color:#68727b}.tag.green{background:#e8f7ef;color:#247c55}
    .project-note{margin-top:8px;color:#5e7185;line-height:1.55;white-space:pre-wrap}
    .project-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:300px}
    .empty{text-align:center;color:var(--muted);padding:28px 8px}
    .modal-mask{position:fixed;inset:0;background:rgba(25,45,62,.42);display:none;align-items:center;justify-content:center;padding:14px;z-index:100}
    .modal-mask.show{display:flex}.modal{width:min(680px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
    .modal-head{padding:15px 17px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{margin:0;color:var(--primary-dark)}.modal-body{padding:17px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}
    label{font-weight:850;font-size:.9rem}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .project-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .menu-card{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:18px;text-align:left}
    .menu-card .icon{font-size:36px}.menu-card strong{display:block;color:var(--primary-dark);font-size:1.08rem;margin-top:8px}.menu-card p{color:var(--muted);line-height:1.55;margin:7px 0 0}
    .footer{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:17px}.version{text-align:center;color:var(--muted);font-size:.8rem;margin-top:16px}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#23364d;color:#fff;padding:11px 16px;border-radius:14px;opacity:0;pointer-events:none;transition:.25s;z-index:200}.toast.show{opacity:1}
    @media(max-width:760px){.summary{grid-template-columns:1fr 1fr 1fr}.filter-row{grid-template-columns:1fr}.project-card{grid-template-columns:1fr}.project-actions{justify-content:flex-start;max-width:none}.project-menu{grid-template-columns:1fr}}
    @media(max-width:480px){.app{padding:12px 10px 40px}.logo{width:62px;height:62px}.summary{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
<main class="app">
  <section class="topbar">
    <div class="brand">
      <img class="logo" src="assets/logo.png?v=20260723" alt="和美智慧校園 LOGO" onerror="this.src='assets/app-icon.png?v=20260723'">
      <div>
        <h1>和美智慧校園｜專案計畫中心</h1>
        <div class="subtitle">先選擇專案，再進入時間表或工作項目及人員分配表；完成後可封存供未來調閱。</div>
      </div>
    </div>
    <div class="status"><span class="pill" id="todayText"></span><span class="pill">專案管理</span><span class="pill">版本 v2.1.0</span></div>
  </section>

  <section class="summary">
    <div class="summary-card"><strong id="activeCount">0</strong><span>進行中專案</span></div>
    <div class="summary-card"><strong id="archivedCount">0</strong><span>已封存專案</span></div>
    <div class="summary-card"><strong id="totalCount">0</strong><span>全部專案</span></div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>專案查詢與建立</h2>
      <button class="primary" type="button" onclick="openProjectForm()">＋ 新增專案</button>
    </div>
    <div class="panel-body">
      <div class="filter-row">
        <input id="keyword" placeholder="搜尋專案名稱、類型或特別註記" oninput="renderProjects()">
        <select id="yearFilter" onchange="renderProjects()"><option value="">全部年度</option></select>
        <select id="statusFilter" onchange="renderProjects()">
          <option value="active">進行中</option>
          <option value="archived">已封存／歷史專案</option>
          <option value="all">全部專案</option>
        </select>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head"><h2 id="listTitle">進行中專案</h2></div>
    <div class="panel-body"><div class="project-list" id="projectList"></div></div>
  </section>

  <div class="footer">
    <button class="primary" type="button" onclick="location.href='secretary.html'">返回智慧秘書</button>
    <button class="secondary" type="button" onclick="location.reload()">重新同步</button>
  </div>
  <div class="version">專案計畫中心 v2.1.0｜2026-07-23｜專案列表、歷史調閱與分頁管理</div>
</main>

<div class="modal-mask" id="modalMask" onclick="maskClose(event)">
  <section class="modal">
    <div class="modal-head"><h3 id="modalTitle"></h3><button class="secondary" onclick="closeModal()">關閉</button></div>
    <div class="modal-body" id="modalBody"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
const PROJECTS_KEY='heremay.projects.v2';
const SELECTED_KEY='heremay.selectedProjectId';

function uid(){return 'P'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
const defaultProjects=[
  {id:'P2026XMAS',name:'2026 聖誕節活動',type:'節慶活動',activityDate:'2026-12-24',status:'active',note:'親子活動、表演與園內布置。',specialNote:'',createdAt:'2026-07-23'},
  {id:'P2025GRAD',name:'2025 畢業典禮',type:'畢業典禮',activityDate:'2025-07-19',status:'archived',note:'已完成並封存，可供往後籌備調閱。',specialNote:'雨天備案與室內動線調整',createdAt:'2025-03-01'}
];

function loadProjects(){
  try{
    const raw=localStorage.getItem(PROJECTS_KEY);
    if(raw){
      const list=JSON.parse(raw);
      if(Array.isArray(list))return list;
    }
  }catch(e){}
  localStorage.setItem(PROJECTS_KEY,JSON.stringify(defaultProjects));
  return JSON.parse(JSON.stringify(defaultProjects));
}
let projects=loadProjects();

function saveProjects(){localStorage.setItem(PROJECTS_KEY,JSON.stringify(projects));renderProjects()}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function formatDate(v){
  if(!v)return '未設定日期';
  return new Date(v+'T00:00:00').toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function daysUntil(v){
  if(!v)return null;
  const a=new Date();a.setHours(0,0,0,0);
  const b=new Date(v+'T00:00:00');
  return Math.round((b-a)/86400000);
}
function countdownTag(p){
  if(p.status==='archived')return '<span class="tag gray">已封存</span>';
  const d=daysUntil(p.activityDate);
  if(d===null)return '<span class="tag">未設定日期</span>';
  if(d<0)return `<span class="tag gray">已過 ${Math.abs(d)} 天</span>`;
  if(d===0)return '<span class="tag red">今天活動</span>';
  if(d<=7)return `<span class="tag red">倒數 ${d} 天</span>`;
  if(d<=30)return `<span class="tag orange">倒數 ${d} 天</span>`;
  return `<span class="tag green">倒數 ${d} 天</span>`;
}
function populateYears(){
  const select=document.getElementById('yearFilter');
  const current=select.value;
  const years=[...new Set(projects.map(p=>String(p.activityDate||'').slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);
  select.innerHTML='<option value="">全部年度</option>'+years.map(y=>`<option value="${y}">${y} 年</option>`).join('');
  select.value=current;
}
function renderProjects(){
  populateYears();
  const keyword=document.getElementById('keyword').value.trim().toLowerCase();
  const year=document.getElementById('yearFilter').value;
  const status=document.getElementById('statusFilter').value;
  const list=projects.filter(p=>{
    const hay=[p.name,p.type,p.note,p.specialNote].join(' ').toLowerCase();
    return (!keyword||hay.includes(keyword))&&(!year||String(p.activityDate||'').startsWith(year))&&(status==='all'||p.status===status);
  }).sort((a,b)=>String(b.activityDate).localeCompare(String(a.activityDate)));
  document.getElementById('listTitle').textContent=status==='active'?'進行中專案':status==='archived'?'已封存／歷史專案':'全部專案';
  document.getElementById('activeCount').textContent=projects.filter(p=>p.status==='active').length;
  document.getElementById('archivedCount').textContent=projects.filter(p=>p.status==='archived').length;
  document.getElementById('totalCount').textContent=projects.length;
  const box=document.getElementById('projectList');
  if(!list.length){box.innerHTML='<div class="empty">目前沒有符合條件的專案。</div>';return}
  box.innerHTML=list.map(p=>`
    <article class="project-card ${p.status==='archived'?'archived':''}">
      <div>
        <div class="project-name">${esc(p.name)}</div>
        <div class="project-meta">
          <span class="tag">${esc(p.type||'未分類')}</span>
          ${countdownTag(p)}
          <span>活動日期：${esc(formatDate(p.activityDate))}</span>
        </div>
        ${p.note?`<div class="project-note">${esc(p.note)}</div>`:''}
        ${p.specialNote?`<div class="project-note"><strong>特別註記：</strong>${esc(p.specialNote)}</div>`:''}
      </div>
      <div class="project-actions">
        <button class="primary" onclick="openProject('${p.id}')">進入專案</button>
        <button class="secondary" onclick="openProjectForm('${p.id}')">編輯</button>
        ${p.status==='active'
          ?`<button class="success" onclick="archiveProject('${p.id}')">封存</button>`
          :`<button class="success" onclick="restoreProject('${p.id}')">解除封存</button>`}
        <button class="danger" onclick="deleteProject('${p.id}')">刪除</button>
      </div>
    </article>`).join('');
}
function openModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalMask').classList.add('show');
}
function closeModal(){document.getElementById('modalMask').classList.remove('show')}
function maskClose(e){if(e.target.id==='modalMask')closeModal()}

function openProjectForm(id=''){
  const p=projects.find(x=>x.id===id)||{name:'',type:'一般活動',activityDate:'',note:'',specialNote:'',status:'active'};
  openModal(id?'編輯專案':'新增專案',`
    <form id="projectForm">
      <div class="grid">
        <div class="field full"><label>專案名稱</label><input name="name" required value="${esc(p.name)}" placeholder="例如：2027 畢業典禮"></div>
        <div class="field"><label>專案類型</label><input name="type" required value="${esc(p.type)}" placeholder="例如：畢業典禮、聖誕活動"></div>
        <div class="field"><label>活動日期</label><input type="date" name="activityDate" required value="${esc(p.activityDate)}"></div>
        <div class="field full"><label>專案說明</label><textarea name="note" placeholder="活動目的、範圍或基本說明">${esc(p.note)}</textarea></div>
        <div class="field full"><label>特別註記／歷史經驗</label><textarea name="specialNote" placeholder="例如：營火晚會、雨天備案、曾發生的困難與解法">${esc(p.specialNote)}</textarea></div>
      </div>
      <div class="actions"><button class="primary" type="submit">${id?'儲存修改':'建立專案'}</button></div>
    </form>`);
  document.getElementById('projectForm').addEventListener('submit',e=>{
    e.preventDefault();
    const f=new FormData(e.target);
    const data={
      id:id||uid(),name:f.get('name').trim(),type:f.get('type').trim(),
      activityDate:f.get('activityDate'),note:f.get('note').trim(),
      specialNote:f.get('specialNote').trim(),status:p.status||'active',
      createdAt:p.createdAt||new Date().toISOString().slice(0,10)
    };
    if(id){projects[projects.findIndex(x=>x.id===id)]=data}else projects.push(data);
    saveProjects();closeModal();toast(id?'專案已更新':'專案已建立');
  });
}
function openProject(id){
  const p=projects.find(x=>x.id===id);
  if(!p)return;
  localStorage.setItem(SELECTED_KEY,id);
  location.href='project_home.html';
}
function archiveProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  if(!confirm(`確定封存「${p.name}」嗎？封存後仍可在歷史專案中調閱。`))return;
  p.status='archived';saveProjects();toast('專案已封存');
}
function restoreProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  p.status='active';saveProjects();toast('專案已解除封存');
}
function deleteProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  if(!confirm(`確定永久刪除「${p.name}」嗎？此動作也會移除該專案的時間表與工作分配資料，且無法復原。`))return;
  projects=projects.filter(x=>x.id!==id);
  localStorage.removeItem('heremay.project.timeline.'+id);
  localStorage.removeItem('heremay.work.assignment.'+id);
  if(localStorage.getItem(SELECTED_KEY)===id)localStorage.removeItem(SELECTED_KEY);
  saveProjects();toast('專案已刪除');
}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1800);
}
document.getElementById('todayText').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
renderProjects();
</script>
</body>
</html>
