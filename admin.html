<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <style>
    :root{
      --bg1:#eaf7ff;
      --bg2:#f5fbff;
      --blue:#73bfe9;
      --blue2:#4aa9dc;
      --deep:#24536b;
      --card:#ffffff;
      --soft:#f0f9ff;
      --line:#cceaf7;
      --pink:#ffe8f2;
      --green:#e7f8ed;
      --yellow:#fff7db;
      --red:#ff6b6b;

    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#20323d;
      min-height:100vh;
    }
    body.auth-pending .app{visibility:hidden}
    .accessDenied{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .accessDeniedCard{
      width:min(440px,100%);
      background:#fff;
      border:1px solid #d6edf8;
      border-radius:28px;
      padding:26px 20px;
      text-align:center;
      box-shadow:var(--shadow);
    }
    .accessDeniedCard .lockIcon{font-size:48px;margin-bottom:10px}
    .accessDeniedCard h2{margin:0;color:#24536b}
    .accessDeniedCard p{color:#607987;line-height:1.7;font-weight:700}
    .accessDeniedCard button{
      border:0;border-radius:18px;padding:12px 18px;
      background:#54addc;color:#fff;font-size:16px;font-weight:900;cursor:pointer;
    }

    .app{
      width:min(980px,100%);
      margin:0 auto;
      padding:18px 14px 34px;
    }
    .topbar{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      border-radius:30px;
      padding:16px;
      display:flex;
      align-items:center;
      gap:14px;
      position:sticky;
      top:10px;
      z-index:20;
    }
    .logo{
      width:58px;height:58px;border-radius:19px;
      background:linear-gradient(145deg,#ffe9a8,#ffd9ef 55%,#b9e8ff);

      box-shadow:inset 0 2px 7px rgba(255,255,255,.75),0 8px 16px rgba(79,143,180,.18);
      flex:0 0 auto;
      font-size:32px;
      overflow:hidden;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:5px;
    }
    .brand{flex:1;min-width:0}
    .brand h1{margin:0;font-size:20px;letter-spacing:.3px;color:var(--deep)}

    .clock{

      font-weight:900;
      font-size:20px;

      border-radius:18px;
      padding:10px 12px;

    .clock .dateLine{font-size:24px;letter-spacing:.2px}
    .clock .timeLine{font-size:34px;color:#1f6f99}
    .hero{
      margin-top:16px;
      background:linear-gradient(135deg,#dff4ff,#f7fcff 65%,#ffffff);
      border:1px solid #d6effb;
      box-shadow:var(--shadow);
      border-radius:32px;
      padding:22px 18px;
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:16px;
      align-items:center;
    }
    .welcome h2{margin:0;color:#244e65;font-size:26px}
    .welcome p{margin:8px 0 0;color:#607987;line-height:1.6}
    .roleBadge{
      display:inline-flex;align-items:center;gap:8px;
      background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:8px 12px;font-size:14px;font-weight:700;color:#35749a;margin-top:12px;
    }
    .quickStatus{
      display:grid;gap:10px;
    }
    .pillBox{
      background:rgba(255,255,255,.82);border:1px solid #d6edf8;border-radius:20px;padding:12px 14px;
    }
    .pillBox strong{display:block;font-size:20px;color:#246184}
    .pillBox span{font-size:13px;color:#648291}
    .sectionTitle{

    }
    .cardBtn{

    .cards2{

    }
    .time{

    }
    .item h5{margin:0;font-size:15px;color:#2a4b5d}.item p{margin:4px 0 0;color:#708996;font-size:13px;line-height:1.45}
    .dueTabs{display:flex;gap:8px;margin:8px 0 12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:700;color:#52819b;cursor:pointer}.tab.active{background:#52addd;color:white;border-color:#52addd}
    .footerNav{

    .modalMask{position:fixed;inset:0;background:rgba(18,42,58,.32);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:12px}.modalMask.show{display:flex}.modal{width:min(660px,100%);max-height:86vh;overflow:auto;background:white;border-radius:28px;padding:18px;box-shadow:0 20px 50px rgba(20,60,80,.28)}

    label{display:block;font-weight:800;color:#355e73;margin:12px 0 6px}input,textarea,select{width:100%;border:1px solid #cfe7f3;border-radius:16px;padding:12px 13px;font-size:16px;background:#fbfeff}textarea{min-height:92px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:12px 14px;font-size:16px;font-weight:900;cursor:pointer;background:#54addc;color:white}.btn.secondary{background:#edf8fe;color:#347da3;border:1px solid #ccecf9}.btn.warn{background:#ffcf71;color:#704700}.btnRow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.checkGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}.check{background:#f5fbff;border:1px solid #d7edf8;border-radius:16px;padding:10px;display:flex;gap:8px;align-items:center}.check input{width:auto}.note{background:#fff9e9;border:1px solid #ffe4a5;border-radius:18px;padding:12px;color:#755d2d;font-size:14px;line-height:1.55}.toast{position:fixed;left:50%;top:94px;transform:translateX(-50%);background:#24536b;color:white;border-radius:999px;padding:12px 16px;font-weight:800;box-shadow:0 12px 24px rgba(30,70,90,.24);display:none;z-index:120}.toast.show{display:block;animation:fade 2.8s ease forwards}@keyframes fade{0%{opacity:0;transform:translate(-50%,-8px)}12%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-8px)}}

<body class="auth-pending">
  <div class="toast" id="toast"></div>
  <main class="app" id="home">
    <header class="topbar">

      <div class="brand">
        <h1>Heremay 和美智慧校園</h1>

      <div class="clock" id="clock">--</div>

    <section class="quickCapture">

<script>
const SERVICE_URL = 'https://script.google.com/macros/s/AKfycbzbZ6r6c8XjHuKad0U5TIJXr8i141fCBwNJcVsKnoGa1-NXG_JOzapeRF5cVlnGI4F7/exec';

let currentAdminEmployee = null;

function readCurrentEmployee(){
  try{
    const raw = localStorage.getItem('heremay.currentEmployee');
    return raw ? JSON.parse(raw) : null;
  }catch(error){
    return null;
  }
}

function isManagementEmployee(employee){
  const loginRole = String(
    localStorage.getItem('heremay.currentRole') || ''
  ).trim().toLowerCase();

  if(loginRole === 'admin') return true;
  if(!employee) return false;

  const homeType = String(
    employee.homeType ??
    employee.home ??
    employee['首頁類型'] ??
    ''
  ).trim();

  const role = String(
    employee.role ??
    employee.userRole ??
    employee['角色'] ??
    ''
  ).trim().toLowerCase();

  const identity = String(
    employee.identity ??
    employee.identityType ??
    employee['身分類別'] ??
    ''
  ).trim();

  const jobTitle = String(
    employee.jobTitle ??
    employee.title ??
    employee.position ??
    employee['職稱'] ??
    ''
  ).trim();

  return (
    homeType === '管理首頁' ||

function postToService(fields){
  const iframeName = `heremayAdminFrame_${Date.now()}`;

  const iframe = document.createElement('iframe');
  iframe.name = iframeName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SERVICE_URL;
  form.target = iframeName;
  form.style.display = 'none';

  Object.entries(fields).forEach(([name, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = String(value ?? '');
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    form.remove();
    iframe.remove();
  }, 15000);
}

function beep(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.value = 0.95;
    master.connect(ctx.destination);

    const tones = [880, 1175, 880, 1175, 988, 1319];
    tones.forEach((frequency, index) => {
      const start = ctx.currentTime + index * 0.48;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(0.001, start);
      gain.gain.exponentialRampToValueAtTime(0.42, start + 0.03);
      gain.gain.setValueAtTime(0.42, start + 0.28);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.42);
      osc.connect(gain);
      gain.connect(master);
      osc.start(start);
      osc.stop(start + 0.44);
    });

    setTimeout(() => { try{ ctx.close(); }catch(e){} }, 3600);
  }catch(e){}

  if(navigator.vibrate){
    navigator.vibrate([500,180,500,180,700,220,900]);
  }
}

function notebookOwnerKey(){
  const employee = currentAdminEmployee || readCurrentEmployee() || {};
  return String(employee.employeeId || employee.id || employee.name || 'guest').trim();
}
function notebookStorageKey(){ return 'heremay.notebooks.' + notebookOwnerKey(); }
function noteStorageKey(){ return 'heremay.notes.' + notebookOwnerKey(); }
function getNotebooks(){
  try{
    const list = JSON.parse(localStorage.getItem(notebookStorageKey()) || '[]');
    if(Array.isArray(list) && list.length) return list;
  }catch(e){}
  const defaults=[{id:'inbox',name:'收件匣'},{id:'personal',name:'私人事項'},{id:'campus',name:'園務待辦'}];
  localStorage.setItem(notebookStorageKey(),JSON.stringify(defaults));
  return defaults;
}
function saveNotebooks(list){ localStorage.setItem(notebookStorageKey(),JSON.stringify(list)); }
function getNotes(){
  try{const list=JSON.parse(localStorage.getItem(noteStorageKey())||'[]');return Array.isArray(list)?list:[];}catch(e){return [];}
}
function saveNotes(list){ localStorage.setItem(noteStorageKey(),JSON.stringify(list)); }
function refreshQuickNotebookOptions(){
  const select=document.getElementById('quickNotebook'); if(!select) return;
  const current=select.value;
  select.innerHTML=getNotebooks().map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  if(current && getNotebooks().some(b=>b.id===current)) select.value=current;
}
function saveQuickNote(){
  const text=document.getElementById('quickNoteText')?.value.trim();
  if(!text) return showToast('請先輸入要記錄的內容');
  const notes=getNotes();
  notes.unshift({
    id:'note_'+Date.now(),
    notebookId:document.getElementById('quickNotebook')?.value||'inbox',
    text,
    reminderAt:document.getElementById('quickReminderAt')?.value||'',
    privacy:'private',
    createdAt:new Date().toISOString()
  });
  saveNotes(notes);
  document.getElementById('quickNoteText').value='';
  document.getElementById('quickReminderAt').value='';
  showToast('記事已儲存，離線也能查看');
}
let activeNotebookId='inbox';
function createNotebook(){
  const input=document.getElementById('newNotebookName');
  const name=input?.value.trim();
  if(!name) return showToast('請輸入筆記本名稱');
  const books=getNotebooks();
  if(books.some(b=>b.name===name)) return showToast('已有同名筆記本');
  const id='book_'+Date.now(); books.push({id,name}); saveNotebooks(books); activeNotebookId=id;
  if(input) input.value='';
  refreshQuickNotebookOptions(); renderNotebookManager();
}
function renderNotebookManager(){
  const books=getNotebooks();
  if(!books.some(b=>b.id===activeNotebookId)) activeNotebookId=books[0]?.id||'inbox';
  const tabs=document.getElementById('notebookTabs');
  const box=document.getElementById('notebookNotes');
  if(!tabs||!box) return;
  tabs.innerHTML=books.map(b=>`<button class="bookChip ${b.id===activeNotebookId?'active':''}" onclick="selectNotebook('${b.id}')">${b.name}</button>`).join('');
  const notes=getNotes().filter(n=>n.notebookId===activeNotebookId);
  box.innerHTML=notes.length?notes.map(n=>{
    const created=new Date(n.createdAt); const dt=isNaN(created)?'':created.toLocaleString('zh-TW',{hour12:false});
    return `<article class="noteEntry"><h5>${n.reminderAt?'🔔 有提醒':'📝 私人記事'}</h5><p>${escapeNoteHtml(n.text)}</p><div class="noteMeta">建立：${dt}${n.reminderAt?'｜提醒：'+n.reminderAt.replace('T',' '):''}</div><div class="noteActions"><button class="miniBtn secondary" onclick="convertNoteToTask('${n.id}')">轉成智慧任務</button><button class="miniBtn secondary" onclick="moveNotePrompt('${n.id}')">移動</button><button class="miniBtn secondary" onclick="deleteNote('${n.id}')">刪除</button></div></article>`;
  }).join(''):'<div class="hintBox">這本筆記本目前沒有記事。</div>';
}
function escapeNoteHtml(text){return String(text).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function selectNotebook(id){activeNotebookId=id;renderNotebookManager();}
function deleteNote(id){
  if(!confirm('確定刪除這則記事嗎？')) return;
  saveNotes(getNotes().filter(n=>n.id!==id)); renderNotebookManager(); showToast('記事已刪除');
}
function moveNotePrompt(id){
  const books=getNotebooks();
  const names=books.map((b,i)=>`${i+1}. ${b.name}`).join('\n');
  const ans=prompt('請輸入要移動到的筆記本編號：\n'+names,'1');
  const idx=Number(ans)-1; if(!books[idx]) return;
  const notes=getNotes(); const note=notes.find(n=>n.id===id); if(note) note.notebookId=books[idx].id;
  saveNotes(notes); renderNotebookManager(); showToast('記事已移動');
}
function convertNoteToTask(id){
  const note=getNotes().find(n=>n.id===id); if(!note) return;
  closeModal(); openModal('smartTask');
  setTimeout(()=>{
    const title=document.querySelector('#modal input[placeholder*="明日中午會議"]');
    const content=document.getElementById('mainContentText');
    if(title) title.value=note.text.slice(0,28);
    if(content) content.value=note.text;
  },0);
}

function renderNoticeTrack(){
  const list=document.getElementById('noticeTrackList');
  if(!list) return;
  let ackTotal=0, missTotal=0;
  list.innerHTML = noticeTracks.map(n=>{
    const ack=n.people.filter(p=>p.ack).length;
    const total=n.people.length;
    const miss=total-ack;
    ackTotal += ack; missTotal += miss;
    const pct=Math.round(ack/total*100);
    return `<div class="noticeItem">
      <div>
        <h5>${n.must?'🔴':'🔵'} ${n.title}</h5>
        <p>對象：${n.target}｜發布：${n.sent}｜已收到 ${ack}/${total} 人，未確認 ${miss} 人</p>
        <div class="progress"><span style="width:${pct}%"></span></div>
      </div>
      <button class="miniBtn notice-detail-btn" type="button" data-notice-id="${n.id}" onclick="openNoticeFromButton(this)">查看名單</button>
    </div>`;
  }).join('');
  document.getElementById('noticeTotal').textContent = noticeTracks.length;
  document.getElementById('ackTotal').textContent = ackTotal;
  document.getElementById('missTotal').textContent = missTotal;
}

function openNoticeFromButton(button){
  const noticeId = String(button && button.dataset
    ? button.dataset.noticeId || ''
    : '').trim();

  if(!noticeId){
    showToast('找不到公告編號');
    return;
  }

  showNoticeTrack(noticeId);
}


function showNoticeTrack(id){
  const n = noticeTracks.find(x=>x.id===id);
  if(!n) return;
  const ack = n.people.filter(p=>p.ack);
  const miss = n.people.filter(p=>!p.ack);
  document.getElementById('modal').innerHTML = `
    <div class="modalHeader"><h3>公告確認狀態</h3><button class="x" onclick="closeModal()">關閉</button></div>
    <div class="note">
      <strong>${n.title}</strong><br>
      對象：${n.target}｜發布：${n.sent}｜${n.must?'重要公告：需確認':'一般公告：可確認'}
    </div>
    <div class="noticeSummary">
      <div class="summaryBox"><strong>${n.people.length}</strong><span>通知對象</span></div>
      <div class="summaryBox"><strong>${ack.length}</strong><span>已收到</span></div>
      <div class="summaryBox"><strong>${miss.length}</strong><span>未確認</span></div>
    </div>
    <div class="panel" style="box-shadow:none;margin-top:10px">
      <h3 style="margin:0 0 8px;color:#254f65">已收到名單</h3>
      ${ack.map(p=>`<div class="personRow"><span>${p.name}｜${p.group}</span><span class="statusOk">${p.time} 已收到</span></div>`).join('') || '<div class="personRow"><span>尚無</span><span></span></div>'}
    </div>
    <div class="panel" style="box-shadow:none;margin-top:10px">
      <h3 style="margin:0 0 8px;color:#254f65">尚未確認名單</h3>
      ${miss.map(p=>`<div class="personRow"><span>${p.name}｜${p.group}</span><span class="statusMiss">尚未確認</span></div>`).join('') || '<div class="personRow"><span>全部已確認</span><span class="statusOk">✅</span></div>'}
    </div>
    <div class="btnRow"><button class="btn secondary" id="remindBtn" onclick="remindUnconfirmed('${n.id}')">提醒未確認人員</button><button class="btn" onclick="closeModal()">完成</button></div>
  `;
  document.getElementById('modalMask').classList.add('show');
}


let pendingReminderNoticeId = '';

function remindUnconfirmed(noticeId){
  const notice = noticeTracks.find(item => String(item.id) === String(noticeId));

  if(!notice){
    showToast('找不到公告資料');
    return;
  }

  const missing = notice.people.filter(person => !person.ack);

  if(!missing.length){
    showToast('這則公告已全部確認，不需要再次提醒');
    return;
  }

  const button = document.getElementById('remindBtn');
  if(button){
    button.disabled = true;
    button.textContent = '正在送出提醒…';
  }

  if(!isManagementEmployee(currentAdminEmployee)){
    showToast('目前不是主管身分，無法送出再次提醒');
    if(button){
      button.disabled = false;
      button.textContent = '提醒未確認人員';
    }
    return;
  }

  const senderName = String(currentAdminEmployee.name || '主管').trim();

  pendingReminderNoticeId = String(notice.id);

  postToService({
    action: 'remindUnconfirmed',
    noticeId: notice.id,
    noticeTitle: notice.title,
    targetType: notice.target,
    senderName: senderName,
    employeeIds: JSON.stringify(missing.map(person => person.employeeId || '')),
    employeeNames: JSON.stringify(missing.map(person => person.name || ''))
  });

  showToast(`正在提醒 ${missing.length} 位尚未確認人員…`);
}

function noticeAudienceForId(noticeId, employees){
  const isTeacher = String(noticeId).startsWith('teacher-');
  const isSupport = String(noticeId).startsWith('support-');

  return employees.filter(employee => {
    const homeType = String(employee.homeType || '').trim();
    if(isTeacher) return homeType === '教保首頁';
    if(isSupport) return homeType === '庶務首頁';
    return false;
  });
}

function buildCloudNoticeTracks(payload){
  const employees = Array.isArray(payload.employees) ? payload.employees : [];
  const records = Array.isArray(payload.records) ? payload.records : [];

  const definitions = [
    {
      id:'teacher-1',
      title:'下午 4:10 請協助整理戶外玩具',
      target:'教保人員',
      sent:'今天 09:10',
      must:true
    },
    {
      id:'teacher-2',
      title:'明日拍攝活動照片提醒',
      target:'全體教保人員',
      sent:'今天 08:20',
      must:false
    },
    {
      id:'support-1',
      title:'今日午餐後請加強廚房地面清潔',
      target:'廚工／清潔人員',
      sent:'今天 09:05',
      must:true
    },
    {
      id:'support-2',
      title:'清潔用品本週五前完成盤點',
      target:'庶務工作',
      sent:'今天 08:30',
      must:false
    }
  ];

  return definitions.map(def => {
    const audience = noticeAudienceForId(def.id, employees);
    const ackRecords = records.filter(record => record.noticeId === def.id);

    const people = audience.map(employee => {
      const record = ackRecords.find(item =>
        (employee.employeeId && item.employeeId === employee.employeeId) ||
        item.employeeName === employee.name
      );

      return {
        employeeId: employee.employeeId || '',
        name: employee.name,
        group: employee.group || employee.jobTitle || '',
        ack: Boolean(record),
        time: record ? record.confirmedAt : ''
      };
    });

    // Keep any cloud record whose employee is no longer in the enabled employee list.
    ackRecords.forEach(record => {
      if(!people.some(person => person.name === record.employeeName)){
        people.push({
          employeeId: record.employeeId || '',
          name: record.employeeName,
          group: '紀錄保留',
          ack: true,
          time: record.confirmedAt
        });
      }
    });

    return {...def, people};
  });
}

window.addEventListener('message', event => {
  const data = event.data || {};
  const payload = data.payload || {};

  if(data.type === 'HEREMAY_REMIND_RESULT'){
    const button = document.getElementById('remindBtn');

    if(button){
      button.disabled = false;
      button.textContent = '提醒未確認人員';
    }

    if(!payload.ok){
      showToast(payload.message || '再次提醒送出失敗');
      return;
    }

    showToast(`✅ ${payload.message || '已送出再次提醒'}`);

    if(button){
      button.textContent = '已送出提醒';
      button.disabled = true;
    }

    pendingReminderNoticeId = '';
    return;
  }

  if(data.type !== 'HEREMAY_ACK_RECORDS_RESULT') return;

  if(!payload.ok){
    showToast(payload.message || '無法載入雲端公告紀錄');
    return;
  }

  noticeTracks = buildCloudNoticeTracks(payload);
  renderNoticeTrack();
  showToast('已載入最新公告確認紀錄');
});

function loadCloudAckRecords(){
  postToService({action:'getAckRecords'});
}

if(requireAdminAccess()){
  refreshQuickNotebookOptions();
  renderNoticeTrack();
  loadCloudAckRecords();
}

</script>
