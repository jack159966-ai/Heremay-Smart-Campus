<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heremay 和美智慧校園｜主管工作台 v22</title>
  <style>
    :root{
      --bg1:#eaf7ff;
      --bg2:#f5fbff;
      --blue:#73bfe9;
      --blue2:#4aa9dc;
      --deep:#24536b;
      --card:#ffffff;
      --soft:#f0f9ff;
      --line:#cceaf7;
      --pink:#ffe8f2;
      --green:#e7f8ed;
      --yellow:#fff7db;
      --red:#ff6b6b;
      --shadow:0 12px 28px rgba(65,130,170,.16);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#20323d;
      min-height:100vh;
    }
    body.auth-pending .app{visibility:hidden}
    .accessDenied{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .accessDeniedCard{
      width:min(440px,100%);
      background:#fff;
      border:1px solid #d6edf8;
      border-radius:28px;
      padding:26px 20px;
      text-align:center;
      box-shadow:var(--shadow);
    }
    .accessDeniedCard .lockIcon{font-size:48px;margin-bottom:10px}
    .accessDeniedCard h2{margin:0;color:#24536b}
    .accessDeniedCard p{color:#607987;line-height:1.7;font-weight:700}
    .accessDeniedCard button{
      border:0;border-radius:18px;padding:12px 18px;
      background:#54addc;color:#fff;font-size:16px;font-weight:900;cursor:pointer;
    }

    .app{
      width:min(980px,100%);
      margin:0 auto;
      padding:18px 14px 34px;
    }
    .topbar{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      border-radius:30px;
      padding:16px;
      display:flex;
      align-items:center;
      gap:14px;
      position:sticky;
      top:10px;
      z-index:20;
    }
    .logo{
      width:58px;height:58px;border-radius:19px;
      background:linear-gradient(145deg,#ffe9a8,#ffd9ef 55%,#b9e8ff);
      display:grid;place-items:center;
      box-shadow:inset 0 2px 7px rgba(255,255,255,.75),0 8px 16px rgba(79,143,180,.18);
      flex:0 0 auto;
      font-size:32px;
      overflow:hidden;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:5px;
    }
    .brand{flex:1;min-width:0}
    .brand h1{margin:0;font-size:20px;letter-spacing:.3px;color:var(--deep)}
    .brand p{margin:5px 0 0;font-size:13px;color:#5f7a89;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .clock{
      text-align:right;
      color:#31576b;
      font-weight:900;
      font-size:20px;
      line-height:1.35;
      min-width:190px;
      background:#ffffffaa;
      border:1px solid #d8eef8;
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 6px 16px rgba(70,130,160,.10);
    }
    .clock .dateLine{font-size:24px;letter-spacing:.2px}
    .clock .timeLine{font-size:34px;color:#1f6f99}
    .hero{
      margin-top:16px;
      background:linear-gradient(135deg,#dff4ff,#f7fcff 65%,#ffffff);
      border:1px solid #d6effb;
      box-shadow:var(--shadow);
      border-radius:32px;
      padding:22px 18px;
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:16px;
      align-items:center;
    }
    .welcome h2{margin:0;color:#244e65;font-size:26px}
    .welcome p{margin:8px 0 0;color:#607987;line-height:1.6}
    .roleBadge{
      display:inline-flex;align-items:center;gap:8px;
      background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:8px 12px;font-size:14px;font-weight:700;color:#35749a;margin-top:12px;
    }
    .quickStatus{
      display:grid;gap:10px;
    }
    .pillBox{
      background:rgba(255,255,255,.82);border:1px solid #d6edf8;border-radius:20px;padding:12px 14px;
    }
    .pillBox strong{display:block;font-size:20px;color:#246184}
    .pillBox span{font-size:13px;color:#648291}
    .sectionTitle{
      margin:22px 4px 10px;
      display:flex;align-items:end;justify-content:space-between;gap:10px;
    }
    .sectionTitle h3{margin:0;color:#254f65;font-size:19px}
    .sectionTitle small{color:#6d8794}
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .cardBtn{
      cursor:pointer;
      border:1px solid #d5ecf8;
      background:var(--card);
      border-radius:24px;
      padding:18px 15px;
      min-height:130px;
      box-shadow:0 8px 22px rgba(62,122,160,.11);
      transition:.18s ease;
      text-align:left;
      position:relative;
      overflow:hidden;
    }
    .cardBtn:active{transform:scale(.985)}
    .cardBtn:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(62,122,160,.17)}
    .cardBtn .icon{font-size:32px;margin-bottom:9px}
    .cardBtn h4{margin:0;color:#264e64;font-size:18px}
    .cardBtn p{margin:7px 0 0;color:#6b8592;font-size:13px;line-height:1.45}
    .cardBtn .tag{position:absolute;right:12px;top:12px;background:#ecf8ff;border:1px solid #d3ecfa;border-radius:999px;padding:4px 8px;font-size:12px;color:#4280a3;font-weight:700}
    .cards2{
      display:grid;grid-template-columns:1.05fr .95fr;gap:12px;
      margin-bottom:16px;
    }
    .panel{
      background:rgba(255,255,255,.86);
      border:1px solid #d6edf8;
      border-radius:26px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .list{display:grid;gap:10px;margin-top:10px}
    .item{
      display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid #e1f1f8;border-radius:18px;padding:12px;
    }
    .time{
      flex:0 0 auto;background:#e8f7ff;color:#28739b;border-radius:13px;padding:7px 9px;font-weight:800;font-size:13px;
    }
    .item h5{margin:0;font-size:15px;color:#2a4b5d}.item p{margin:4px 0 0;color:#708996;font-size:13px;line-height:1.45}
    .dueTabs{display:flex;gap:8px;margin:8px 0 12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:700;color:#52819b;cursor:pointer}.tab.active{background:#52addd;color:white;border-color:#52addd}
    .footerNav{
      position:fixed;left:50%;bottom:12px;transform:translateX(-50%);
      width:min(520px,calc(100% - 24px));
      display:flex;justify-content:space-around;gap:8px;
      background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
      border:1px solid #d5edf9;border-radius:24px;padding:8px;box-shadow:0 12px 26px rgba(53,112,150,.18);
      z-index:40;
    }
    .footerNav button{border:0;background:transparent;border-radius:16px;padding:8px 10px;color:#52788c;font-weight:800;cursor:pointer}.footerNav button.active{background:#e9f8ff;color:#2181b3}
    .modalMask{position:fixed;inset:0;background:rgba(18,42,58,.32);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:12px}.modalMask.show{display:flex}.modal{width:min(660px,100%);max-height:86vh;overflow:auto;background:white;border-radius:28px;padding:18px;box-shadow:0 20px 50px rgba(20,60,80,.28)}
    .modalHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.modalHeader h3{margin:0;color:#244f66}.x{border:0;background:#eff8fd;border-radius:14px;padding:8px 11px;cursor:pointer;font-weight:900;color:#47758c}
    label{display:block;font-weight:800;color:#355e73;margin:12px 0 6px}input,textarea,select{width:100%;border:1px solid #cfe7f3;border-radius:16px;padding:12px 13px;font-size:16px;background:#fbfeff}textarea{min-height:92px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:12px 14px;font-size:16px;font-weight:900;cursor:pointer;background:#54addc;color:white}.btn.secondary{background:#edf8fe;color:#347da3;border:1px solid #ccecf9}.btn.warn{background:#ffcf71;color:#704700}.btnRow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.checkGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}.check{background:#f5fbff;border:1px solid #d7edf8;border-radius:16px;padding:10px;display:flex;gap:8px;align-items:center}.check input{width:auto}.note{background:#fff9e9;border:1px solid #ffe4a5;border-radius:18px;padding:12px;color:#755d2d;font-size:14px;line-height:1.55}.toast{position:fixed;left:50%;top:94px;transform:translateX(-50%);background:#24536b;color:white;border-radius:999px;padding:12px 16px;font-weight:800;box-shadow:0 12px 24px rgba(30,70,90,.24);display:none;z-index:120}.toast.show{display:block;animation:fade 2.8s ease forwards}@keyframes fade{0%{opacity:0;transform:translate(-50%,-8px)}12%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-8px)}}
    .alarm{display:none;background:#ffeef0;border:1px solid #ffc6cc;border-radius:22px;padding:14px;margin-top:12px;color:#8b2632}.alarm.show{display:block;animation:pulse .8s ease infinite alternate}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.01)}}

    .noticeBoard{
      background:rgba(255,255,255,.88);
      border:1px solid #d6edf8;
      border-radius:26px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .noticeSummary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:12px 0;
    }
    .summaryBox{
      background:#f5fbff;
      border:1px solid #d7edf8;
      border-radius:18px;
      padding:12px;
      text-align:center;
    }
    .summaryBox strong{
      display:block;
      color:#1f6f99;
      font-size:22px;
      line-height:1.1;
    }
    .summaryBox span{
      color:#648291;
      font-size:12px;
      font-weight:800;
    }
    .noticeItem{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      background:#fff;
      border:1px solid #e1f1f8;
      border-radius:20px;
      padding:12px;
      margin-top:10px;
    }
    .noticeItem h5{margin:0;color:#2a4b5d;font-size:15px}
    .noticeItem p{margin:5px 0 0;color:#708996;font-size:13px;line-height:1.45}
    .progress{
      height:9px;
      background:#e8f7ff;
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }
    .progress span{
      display:block;
      height:100%;
      background:linear-gradient(90deg,#52addd,#84d0f3);
      border-radius:999px;
    }
    .miniBtn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;
      border:0;
      background:#54addc;
      color:white;
      border-radius:999px;
      padding:10px 13px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }
    .miniBtn.secondary{
      background:#edf8fe;
      color:#347da3;
      border:1px solid #ccecf9;
    }
    .personRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:9px 0;
      border-top:1px dashed #d7edf8;
      color:#395d70;
      font-weight:800;
      font-size:14px;
    }
    .personRow:first-child{border-top:0}
    .statusOk{color:#24885c}
    .statusMiss{color:#d04d5c}
    .hintBox{background:#f5fbff;border:1px solid #d7edf8;border-radius:18px;padding:12px;color:#426475;font-size:14px;line-height:1.6;font-weight:800;margin:10px 0}
    .miniGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
    .miniCard{background:#fff;border:1px solid #d7edf8;border-radius:16px;padding:10px;color:#395d70;font-weight:850;font-size:13px;line-height:1.45}
    .miniCard b{display:block;color:#24536b;font-size:14px;margin-bottom:3px}


    .optionRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#f8fcff;border:1px solid #d7edf8;border-radius:16px;padding:8px;margin-top:8px}
    .filePreview{display:grid;gap:8px;margin-top:8px}
    .fileChip{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f5fbff;border:1px solid #d7edf8;border-radius:14px;padding:9px 10px;color:#355e73;font-weight:800;font-size:13px}


    .quickCapture{
      margin-top:16px;background:rgba(255,255,255,.9);border:1px solid #d6edf8;border-radius:28px;padding:16px;box-shadow:var(--shadow);
    }
    .quickCapture h3{margin:0 0 8px;color:#254f65}
    .quickCapture textarea{min-height:82px}
    .quickCaptureActions{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:10px;align-items:end}
    .quickCaptureActions label{margin:0 0 6px}
    .noteBookBar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .bookChip{border:1px solid #cfe7f3;background:#f5fbff;color:#347da3;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer}
    .bookChip.active{background:#54addc;color:#fff;border-color:#54addc}
    .noteEntry{background:#fff;border:1px solid #dfeff7;border-radius:18px;padding:12px;margin-top:9px}
    .noteEntry h5{margin:0;color:#294e62;font-size:15px}
    .noteEntry p{margin:6px 0;color:#607987;white-space:pre-wrap;line-height:1.55}
    .noteMeta{font-size:12px;color:#78909c;font-weight:800}
    .noteActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    @media(max-width:620px){.quickCaptureActions{grid-template-columns:1fr}.quickCaptureActions .btn{width:100%}}

    @media(max-width:760px){.topbar{align-items:flex-start}.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.cards2{grid-template-columns:1fr}.clock{display:block;min-width:130px;font-size:16px;padding:8px 10px}.clock .dateLine{font-size:19px}.clock .timeLine{font-size:30px}.brand h1{font-size:18px}.welcome h2{font-size:23px}.cardBtn{min-height:122px}.row{grid-template-columns:1fr}}
    @media(max-width:420px){.app{padding:12px 10px 34px}.topbar{border-radius:24px;display:grid;grid-template-columns:50px 1fr;gap:10px}.clock{grid-column:1/3;width:100%;text-align:center}.logo{width:50px;height:50px;font-size:28px}.grid{gap:10px}.cardBtn{padding:15px 12px;border-radius:21px}.cardBtn h4{font-size:16px}.cardBtn p{font-size:12px}.checkGrid{grid-template-columns:1fr}}
  
    /* ===== 主管工作台 v19 新版面 ===== */
    :root{
      --dash-blue:#2f68d8;
      --dash-deep:#173f75;
      --dash-soft:#f6f9ff;
      --dash-line:#dfe8f6;
      --dash-orange:#ff8a34;
      --dash-green:#2ca86b;
    }
    body{background:linear-gradient(180deg,#f6f9ff 0%,#eef7ff 52%,#f9fbff 100%)}
    .app{width:min(820px,100%);padding:14px 12px 36px}
    .dashboardHeader{
      display:grid;grid-template-columns:68px 1fr auto;gap:14px;align-items:center;
      padding:10px 6px 16px;
    }
    .dashboardLogo{
      width:68px;height:68px;border-radius:20px;overflow:hidden;background:#fff;
      box-shadow:0 8px 22px rgba(49,91,150,.14);display:grid;place-items:center;
    }
    .dashboardLogo img{width:100%;height:100%;object-fit:contain;padding:3px}
    .dashboardIdentity small{display:block;color:#52708d;font-weight:850;font-size:15px;margin-bottom:3px}
    .dashboardName{font-size:38px;line-height:1.05;font-weight:950;color:#12386f;letter-spacing:.5px}
    .dashboardClock{text-align:right;color:#183f73;font-weight:900}
    .dashboardClock .dateLine{font-size:18px}
    .dashboardClock .timeLine{font-size:36px;line-height:1.05;color:#2461c6;margin-top:4px}
    .dashCard{
      background:rgba(255,255,255,.95);border:1px solid var(--dash-line);
      border-radius:26px;padding:18px;margin-bottom:14px;
      box-shadow:0 10px 28px rgba(45,82,132,.10);
    }
    .dashTitle{
      margin:0 0 14px;display:flex;align-items:center;gap:10px;
      color:#153e72;font-size:25px;font-weight:950;
    }
    .dashTitle .count{
      margin-left:auto;background:#fff2e8;color:#e86f1d;border-radius:999px;
      padding:6px 12px;font-size:15px;
    }
    .taskList{display:grid;gap:9px}
    .taskRow{
      display:grid;grid-template-columns:78px 1fr auto;gap:12px;align-items:center;
      border:1px solid #e6edf8;border-radius:18px;padding:13px;background:#fff;
      transition:.2s ease;
    }
    .taskRow.done{opacity:.45;transform:scale(.99)}
    .taskTime{
      font-size:21px;font-weight:950;color:#2f68c9;background:#edf4ff;
      border-radius:14px;padding:8px;text-align:center;
    }
    .taskTitle{font-size:20px;font-weight:950;color:#1c3557}
    .taskText{font-size:15px;color:#6b7f95;line-height:1.45;margin-top:3px;font-weight:750}
    .taskDoneBtn{
      width:42px;height:42px;border:1px solid #d7e4f5;border-radius:50%;background:#f7faff;
      color:#2f68d8;font-size:22px;cursor:pointer;font-weight:900;
    }
    .completedToggle{
      width:100%;border:0;background:transparent;color:#2f68d8;font-size:17px;
      font-weight:900;padding:12px 4px 0;cursor:pointer;
    }
    .completedList{display:none;margin-top:10px}.completedList.show{display:grid}
    .futureGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .futureBox{border:1px solid #dfe8f6;border-radius:20px;padding:15px;background:#fff}
    .futureBox h3{margin:0 0 10px;color:#2461c6;font-size:19px}
    .futureItem{
      display:grid;grid-template-columns:70px 1fr;gap:10px;padding:9px 0;
      border-top:1px dashed #e3eaf4;font-size:19px;font-weight:900;color:#203b61;
    }
    .futureItem:first-of-type{border-top:0}
    .futureItem time{font-size:20px;color:#183f73}
    .patrolButton{
      width:100%;border:1px solid #c9dcff;border-radius:20px;background:linear-gradient(135deg,#edf4ff,#fff);
      padding:17px 18px;display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
      box-shadow:0 7px 18px rgba(47,104,216,.10);
    }
    .patrolButton .pIcon{font-size:36px}
    .patrolButton strong{font-size:24px;color:#174eaa}
    .patrolButton span{display:block;color:#6a7e95;font-weight:800;margin-top:3px}
    .patrolButton .arrow{margin-left:auto;font-size:30px;color:#2f68d8}
    .secretaryGrid,.lowGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .toolCard{
      border:1px solid #dfe8f6;border-radius:20px;background:#fff;padding:16px;
      display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;
      text-align:left;cursor:pointer;min-height:100px;
    }
    .toolCard .toolIcon{font-size:38px}.toolCard strong{font-size:21px;color:#183f73}
    .toolCard p{margin:4px 0 0;color:#6d8095;font-weight:750;line-height:1.4}
    .toolCard .go{font-size:25px;color:#6082ad}
    .secretaryHeading{margin:0 0 13px;color:#153e72;font-size:24px;font-weight:950}
    .versionStamp{text-align:center;color:#7890a6;font-size:12px;font-weight:800;margin-top:8px}
    @media(max-width:620px){
      .dashboardHeader{grid-template-columns:58px 1fr auto;gap:10px}
      .dashboardLogo{width:58px;height:58px}
      .dashboardIdentity small{font-size:13px}
      .dashboardName{font-size:34px}
      .dashboardClock .dateLine{font-size:14px}
      .dashboardClock .timeLine{font-size:30px}
      .dashCard{padding:15px;border-radius:22px}
      .dashTitle{font-size:23px}
      .taskRow{grid-template-columns:68px 1fr 40px;padding:12px 10px;gap:9px}
      .taskTime{font-size:19px}
      .taskTitle{font-size:19px}
      .taskText{font-size:14px}
      .futureGrid{grid-template-columns:1fr}
      .futureItem{font-size:20px}
      .secretaryGrid,.lowGrid{grid-template-columns:1fr 1fr;gap:10px}
      .toolCard{grid-template-columns:44px 1fr auto;padding:13px;min-height:94px}
      .toolCard .toolIcon{font-size:33px}
      .toolCard strong{font-size:19px}
      .toolCard p{font-size:13px}
    }
    @media(max-width:390px){
      .dashboardName{font-size:30px}
      .dashboardClock .dateLine{display:none}
      .secretaryGrid,.lowGrid{grid-template-columns:1fr}
    }

  </style>
</head>

  <div class="toast" id="toast"></div>
  <main class="app" id="home">
    <header class="dashboardHeader">
      <div class="dashboardLogo"><img src="assets/logo.png?v=20260720" alt="和美智慧校園 Logo" onerror="this.parentElement.textContent='🏰'"></div>
      <div class="dashboardIdentity">
        <small>Heremay 和美智慧校園</small>
        <div class="dashboardName" id="adminName">主管</div>

      <div class="dashboardClock" id="clock">--</div>

<script>
const SERVICE_URL = 'https://script.google.com/macros/s/AKfycbzbZ6r6c8XjHuKad0U5TIJXr8i141fCBwNJcVsKnoGa1-NXG_JOzapeRF5cVlnGI4F7/exec';

let currentAdminEmployee = null;

function readCurrentEmployee(){
  try{
    const raw = localStorage.getItem('heremay.currentEmployee');
    return raw ? JSON.parse(raw) : null;
  }catch(error){
    return null;
  }
}

function isManagementEmployee(employee){
  const loginRole = String(
    localStorage.getItem('heremay.currentRole') || ''
  ).trim().toLowerCase();

  if(loginRole === 'admin') return true;
  if(!employee) return false;

  const homeType = String(
    employee.homeType ??
    employee.home ??
    employee['首頁類型'] ??
    ''
  ).trim();

  const role = String(
    employee.role ??
    employee.userRole ??
    employee['角色'] ??
    ''
  ).trim().toLowerCase();

  const identity = String(
    employee.identity ??
    employee.identityType ??
    employee['身分類別'] ??
    ''
  ).trim();

  const jobTitle = String(
    employee.jobTitle ??
    employee.title ??
    employee.position ??
    employee['職稱'] ??
    ''
  ).trim();

  return (
    homeType === '管理首頁' ||
    role === 'admin' ||
    identity === '行政主管' ||
    identity === '管理層' ||
    /負責人|園長|主任/.test(jobTitle)
  );
}

function requireAdminAccess(){
  const employee = readCurrentEmployee();

  if(!isManagementEmployee(employee)){
    document.body.classList.remove('auth-pending');
    document.body.innerHTML = `
      <main class="accessDenied">
        <section class="accessDeniedCard">
          <div class="lockIcon">🔒</div>
          <h2>此頁限主管使用</h2>
          <p>目前登入身分不是管理人員，因此不能查看主管資料或送出再次提醒。請回登入首頁，改用主管帳號登入。</p>
          <button type="button" onclick="location.replace('index.html')">返回登入首頁</button>
        </section>
      </main>
    `;
    return false;
  }

  currentAdminEmployee = employee;
  document.body.classList.remove('auth-pending');

  const nameBox = document.getElementById('adminName');
  if(nameBox){
    nameBox.textContent = employee?.name || '主管';
  }

  return true;
}


function postToService(fields){
  const iframeName = `heremayAdminFrame_${Date.now()}`;

  const iframe = document.createElement('iframe');
  iframe.name = iframeName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SERVICE_URL;
  form.target = iframeName;
  form.style.display = 'none';

  Object.entries(fields).forEach(([name, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = String(value ?? '');
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    form.remove();
    iframe.remove();
  }, 15000);
}

function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const d=new Date(); const days=['日','一','二','三','四','五','六'];
  const clock=document.getElementById('clock');
  if(clock) clock.innerHTML=`<div class="dateLine">${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}（週${days[d.getDay()]}）</div><div class="timeLine">${pad(d.getHours())}:${pad(d.getMinutes())}</div>`;
  const t1=new Date(d);t1.setDate(d.getDate()+1);
  const t2=new Date(d);t2.setDate(d.getDate()+2);
  const t1Title=document.getElementById('tomorrowTitle');
  const t2Title=document.getElementById('afterTomorrowTitle');
  if(t1Title) t1Title.textContent=`明天 ${t1.getMonth()+1}/${t1.getDate()}（${days[t1.getDay()]}）`;
  if(t2Title) t2Title.textContent=`後天 ${t2.getMonth()+1}/${t2.getDate()}（${days[t2.getDay()]}）`;
}
setInterval(tick,1000); tick();

function completedTaskKey(){return 'heremay.admin.completedTasks.'+new Date().toISOString().slice(0,10)}
function getCompletedTasks(){
  try{return JSON.parse(localStorage.getItem(completedTaskKey())||'[]')}catch(e){return []}
}
function setCompletedTasks(ids){localStorage.setItem(completedTaskKey(),JSON.stringify(ids))}
function completeTask(id){
  const ids=getCompletedTasks();
  if(!ids.includes(id)) ids.push(id);
  setCompletedTasks(ids);
  renderToday();
}
function restoreTask(id){
  setCompletedTasks(getCompletedTasks().filter(x=>x!==id));
  renderToday();
}
function taskMarkup(r,done=false){
  return `<div class="taskRow ${done?'done':''}">
    <div class="taskTime">${r.time}</div>
    <div><div class="taskTitle">${r.title}</div><div class="taskText">${r.text}</div></div>
    <button class="taskDoneBtn" type="button" onclick="${done?`restoreTask('${r.id}')`:`completeTask('${r.id}')`}" title="${done?'恢復待辦':'標記完成'}">${done?'↩':'✓'}</button>
  </div>`;
}
function renderToday(){
  const doneIds=getCompletedTasks();
  const pending=reminders.filter(r=>!doneIds.includes(r.id));
  const done=reminders.filter(r=>doneIds.includes(r.id));
  const pendingBox=document.getElementById('todayList');
  const doneBox=document.getElementById('completedList');
  if(pendingBox) pendingBox.innerHTML=pending.length?pending.map(r=>taskMarkup(r,false)).join(''):'<div class="hintBox">🎉 今天的待辦都完成了。</div>';
  if(doneBox) doneBox.innerHTML=done.map(r=>taskMarkup(r,true)).join('');
  const count=document.getElementById('todayCount');
  if(count) count.textContent=`${pending.length} 件`;
  const toggle=document.getElementById('completedToggle');
  if(toggle) toggle.textContent=`已完成 ${done.length} 件⌄`;
}
function toggleCompleted(){

function renderFuture(){
  const render=(list,id)=>{
    const box=document.getElementById(id);

    box.innerHTML=list.length?list.map(x=>`<div class="futureItem"><time>${x.time}</time><span>${x.title}</span></div>`).join(''):'<div class="hintBox">目前沒有安排</div>';
  };
  render(tomorrowItems,'tomorrowList');
  render(afterTomorrowItems,'afterTomorrowList');
}
renderToday(); renderFuture();
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show')}
function beep(){
  try{const A=window.AudioContext||window.webkitAudioContext,c=new A(),m=c.createGain();m.gain.value=1;m.connect(c.destination);[880,1175,988,1319,880,1175,988,1319,1047,1397,1047,1397,880,1175].forEach((f,i)=>{const st=c.currentTime+i*.58,o=c.createOscillator(),g=c.createGain();o.type=i%2?'sawtooth':'square';o.frequency.value=f;g.gain.setValueAtTime(.001,st);g.gain.exponentialRampToValueAtTime(.85,st+.03);g.gain.setValueAtTime(.85,st+.4);g.gain.exponentialRampToValueAtTime(.001,st+.53);o.connect(g);g.connect(m);o.start(st);o.stop(st+.55)});setTimeout(()=>{try{c.close()}catch(e){}},9000)}catch(e){} if(navigator.vibrate)navigator.vibrate([1000,200,1000,200,1400,250,1000,200,1600]);
}

function notebookOwnerKey(){
  const employee = currentAdminEmployee || readCurrentEmployee() || {};
  return String(employee.employeeId || employee.id || employee.name || 'guest').trim();
}
function notebookStorageKey(){ return 'heremay.notebooks.' + notebookOwnerKey(); }
function noteStorageKey(){ return 'heremay.notes.' + notebookOwnerKey(); }
function getNotebooks(){
  try{
    const list = JSON.parse(localStorage.getItem(notebookStorageKey()) || '[]');
    if(Array.isArray(list) && list.length) return list;
  }catch(e){}
  const defaults=[{id:'inbox',name:'收件匣'},{id:'personal',name:'私人事項'},{id:'campus',name:'園務待辦'}];
  localStorage.setItem(notebookStorageKey(),JSON.stringify(defaults));
  return defaults;
}
function saveNotebooks(list){ localStorage.setItem(notebookStorageKey(),JSON.stringify(list)); }
function getNotes(){
  try{const list=JSON.parse(localStorage.getItem(noteStorageKey())||'[]');return Array.isArray(list)?list:[];}catch(e){return [];}
}
function saveNotes(list){ localStorage.setItem(noteStorageKey(),JSON.stringify(list)); }
function refreshQuickNotebookOptions(){
  const select=document.getElementById('quickNotebook'); if(!select) return;
  const current=select.value;
  select.innerHTML=getNotebooks().map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  if(current && getNotebooks().some(b=>b.id===current)) select.value=current;
}
function saveQuickNote(){
  const text=document.getElementById('quickNoteText')?.value.trim();
  if(!text) return showToast('請先輸入要記錄的內容');
  const notes=getNotes();
  notes.unshift({
    id:'note_'+Date.now(),
    notebookId:document.getElementById('quickNotebook')?.value||'inbox',
    text,
    reminderAt:document.getElementById('quickReminderAt')?.value||'',
    privacy:'private',
    createdAt:new Date().toISOString()
  });
  saveNotes(notes);
  document.getElementById('quickNoteText').value='';
  document.getElementById('quickReminderAt').value='';
  showToast('記事已儲存，離線也能查看');
}
let activeNotebookId='inbox';
function createNotebook(){
  const input=document.getElementById('newNotebookName');
  const name=input?.value.trim();
  if(!name) return showToast('請輸入筆記本名稱');
  const books=getNotebooks();
  if(books.some(b=>b.name===name)) return showToast('已有同名筆記本');
  const id='book_'+Date.now(); books.push({id,name}); saveNotebooks(books); activeNotebookId=id;
  if(input) input.value='';
  refreshQuickNotebookOptions(); renderNotebookManager();
}
function renderNotebookManager(){
  const books=getNotebooks();
  if(!books.some(b=>b.id===activeNotebookId)) activeNotebookId=books[0]?.id||'inbox';
  const tabs=document.getElementById('notebookTabs');
  const box=document.getElementById('notebookNotes');
  if(!tabs||!box) return;
  tabs.innerHTML=books.map(b=>`<button class="bookChip ${b.id===activeNotebookId?'active':''}" onclick="selectNotebook('${b.id}')">${b.name}</button>`).join('');
  const notes=getNotes().filter(n=>n.notebookId===activeNotebookId);
  box.innerHTML=notes.length?notes.map(n=>{
    const created=new Date(n.createdAt); const dt=isNaN(created)?'':created.toLocaleString('zh-TW',{hour12:false});
    return `<article class="noteEntry"><h5>${n.reminderAt?'🔔 有提醒':'📝 私人記事'}</h5><p>${escapeNoteHtml(n.text)}</p><div class="noteMeta">建立：${dt}${n.reminderAt?'｜提醒：'+n.reminderAt.replace('T',' '):''}</div><div class="noteActions"><button class="miniBtn secondary" onclick="convertNoteToTask('${n.id}')">轉成智慧任務</button><button class="miniBtn secondary" onclick="moveNotePrompt('${n.id}')">移動</button><button class="miniBtn secondary" onclick="deleteNote('${n.id}')">刪除</button></div></article>`;
  }).join(''):'<div class="hintBox">這本筆記本目前沒有記事。</div>';
}
function escapeNoteHtml(text){return String(text).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function selectNotebook(id){activeNotebookId=id;renderNotebookManager();}
function deleteNote(id){
  if(!confirm('確定刪除這則記事嗎？')) return;
  saveNotes(getNotes().filter(n=>n.id!==id)); renderNotebookManager(); showToast('記事已刪除');
}
function moveNotePrompt(id){
  const books=getNotebooks();
  const names=books.map((b,i)=>`${i+1}. ${b.name}`).join('\n');
  const ans=prompt('請輸入要移動到的筆記本編號：\n'+names,'1');
  const idx=Number(ans)-1; if(!books[idx]) return;
  const notes=getNotes(); const note=notes.find(n=>n.id===id); if(note) note.notebookId=books[idx].id;
  saveNotes(notes); renderNotebookManager(); showToast('記事已移動');
}
function convertNoteToTask(id){
  const note=getNotes().find(n=>n.id===id); if(!note) return;
  closeModal(); openModal('smartTask');
  setTimeout(()=>{
    const title=document.querySelector('#modal input[placeholder*="明日中午會議"]');
    const content=document.getElementById('mainContentText');
    if(title) title.value=note.text.slice(0,28);
    if(content) content.value=note.text;
  },0);
}

function renderNoticeTrack(){

    const ack=n.people.filter(p=>p.ack).length;

let pendingReminderNoticeId = '';

function remindUnconfirmed(noticeId){
  const notice = noticeTracks.find(item => String(item.id) === String(noticeId));

  if(!notice){
    showToast('找不到公告資料');
    return;
  }

  const missing = notice.people.filter(person => !person.ack);

  if(!missing.length){
    showToast('這則公告已全部確認，不需要再次提醒');
    return;
  }

  const button = document.getElementById('remindBtn');
  if(button){
    button.disabled = true;
    button.textContent = '正在送出提醒…';
  }

  if(!isManagementEmployee(currentAdminEmployee)){
    showToast('目前不是主管身分，無法送出再次提醒');
    if(button){
      button.disabled = false;
      button.textContent = '提醒未確認人員';
    }
    return;
  }

  const senderName = String(currentAdminEmployee.name || '主管').trim();

  pendingReminderNoticeId = String(notice.id);

  postToService({
    action: 'remindUnconfirmed',
    noticeId: notice.id,
    noticeTitle: notice.title,
    targetType: notice.target,
    senderName: senderName,
    employeeIds: JSON.stringify(missing.map(person => person.employeeId || '')),
    employeeNames: JSON.stringify(missing.map(person => person.name || ''))
  });

  showToast(`正在提醒 ${missing.length} 位尚未確認人員…`);
}

function noticeAudienceForId(noticeId, employees){
  const isTeacher = String(noticeId).startsWith('teacher-');
  const isSupport = String(noticeId).startsWith('support-');

  return employees.filter(employee => {
    const homeType = String(employee.homeType || '').trim();
    if(isTeacher) return homeType === '教保首頁';
    if(isSupport) return homeType === '庶務首頁';
    return false;
  });
}

function buildCloudNoticeTracks(payload){
  const employees = Array.isArray(payload.employees) ? payload.employees : [];
  const records = Array.isArray(payload.records) ? payload.records : [];

  const definitions = [
    {
      id:'teacher-1',
      title:'下午 4:10 請協助整理戶外玩具',
      target:'教保人員',
      sent:'今天 09:10',
      must:true
    },
    {
      id:'teacher-2',
      title:'明日拍攝活動照片提醒',
      target:'全體教保人員',
      sent:'今天 08:20',
      must:false
    },
    {
      id:'support-1',
      title:'今日午餐後請加強廚房地面清潔',
      target:'廚工／清潔人員',
      sent:'今天 09:05',
      must:true
    },
    {
      id:'support-2',
      title:'清潔用品本週五前完成盤點',
      target:'庶務工作',
      sent:'今天 08:30',
      must:false
    }
  ];

  return definitions.map(def => {
    const audience = noticeAudienceForId(def.id, employees);
    const ackRecords = records.filter(record => record.noticeId === def.id);

    const people = audience.map(employee => {
      const record = ackRecords.find(item =>
        (employee.employeeId && item.employeeId === employee.employeeId) ||
        item.employeeName === employee.name
      );

      return {
        employeeId: employee.employeeId || '',
        name: employee.name,
        group: employee.group || employee.jobTitle || '',
        ack: Boolean(record),
        time: record ? record.confirmedAt : ''
      };
    });

    // Keep any cloud record whose employee is no longer in the enabled employee list.
    ackRecords.forEach(record => {
      if(!people.some(person => person.name === record.employeeName)){
        people.push({
          employeeId: record.employeeId || '',
          name: record.employeeName,
          group: '紀錄保留',
          ack: true,
          time: record.confirmedAt
        });
      }
    });

    return {...def, people};
  });
}

window.addEventListener('message', event => {
  const data = event.data || {};
  const payload = data.payload || {};

  if(data.type === 'HEREMAY_REMIND_RESULT'){
    const button = document.getElementById('remindBtn');

    if(button){
      button.disabled = false;
      button.textContent = '提醒未確認人員';
    }

    if(!payload.ok){
      showToast(payload.message || '再次提醒送出失敗');
      return;
    }

    showToast(`✅ ${payload.message || '已送出再次提醒'}`);

    if(button){
      button.textContent = '已送出提醒';
      button.disabled = true;
    }

    pendingReminderNoticeId = '';
    return;
  }

  if(data.type !== 'HEREMAY_ACK_RECORDS_RESULT') return;

  if(!payload.ok){
    showToast(payload.message || '無法載入雲端公告紀錄');
    return;
  }

  noticeTracks = buildCloudNoticeTracks(payload);
  renderNoticeTrack();
  showToast('已載入最新公告確認紀錄');
});
