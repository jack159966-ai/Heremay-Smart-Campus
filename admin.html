<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heremay 和美智慧校園｜智慧秘書中心 v10</title>
  <style>
    :root{
      --bg1:#eaf7ff;
      --bg2:#f5fbff;
      --blue:#73bfe9;
      --blue2:#4aa9dc;
      --deep:#24536b;
      --card:#ffffff;
      --soft:#f0f9ff;
      --line:#cceaf7;
      --pink:#ffe8f2;
      --green:#e7f8ed;
      --yellow:#fff7db;
      --red:#ff6b6b;
      --shadow:0 12px 28px rgba(65,130,170,.16);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#20323d;
      min-height:100vh;
    }
    .app{
      width:min(980px,100%);
      margin:0 auto;
      padding:18px 14px 34px;
    }
    .topbar{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      border-radius:30px;
      padding:16px;
      display:flex;
      align-items:center;
      gap:14px;
      position:sticky;
      top:10px;
      z-index:20;
    }
    .logo{
      width:58px;height:58px;border-radius:19px;
      background:linear-gradient(145deg,#ffe9a8,#ffd9ef 55%,#b9e8ff);
      display:grid;place-items:center;
      box-shadow:inset 0 2px 7px rgba(255,255,255,.75),0 8px 16px rgba(79,143,180,.18);
      flex:0 0 auto;
      font-size:32px;
    }
    .brand{flex:1;min-width:0}
    .brand h1{margin:0;font-size:20px;letter-spacing:.3px;color:var(--deep)}
    .brand p{margin:5px 0 0;font-size:13px;color:#5f7a89;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .clock{
      text-align:right;
      color:#31576b;
      font-weight:900;
      font-size:20px;
      line-height:1.35;
      min-width:190px;
      background:#ffffffaa;
      border:1px solid #d8eef8;
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 6px 16px rgba(70,130,160,.10);
    }
    .clock .dateLine{font-size:24px;letter-spacing:.2px}
    .clock .timeLine{font-size:34px;color:#1f6f99}
    .hero{
      margin-top:16px;
      background:linear-gradient(135deg,#dff4ff,#f7fcff 65%,#ffffff);
      border:1px solid #d6effb;
      box-shadow:var(--shadow);
      border-radius:32px;
      padding:22px 18px;
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:16px;
      align-items:center;
    }
    .welcome h2{margin:0;color:#244e65;font-size:26px}
    .welcome p{margin:8px 0 0;color:#607987;line-height:1.6}
    .roleBadge{
      display:inline-flex;align-items:center;gap:8px;
      background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:8px 12px;font-size:14px;font-weight:700;color:#35749a;margin-top:12px;
    }
    .quickStatus{
      display:grid;gap:10px;
    }
    .pillBox{
      background:rgba(255,255,255,.82);border:1px solid #d6edf8;border-radius:20px;padding:12px 14px;
    }
    .pillBox strong{display:block;font-size:20px;color:#246184}
    .pillBox span{font-size:13px;color:#648291}
    .sectionTitle{
      margin:22px 4px 10px;
      display:flex;align-items:end;justify-content:space-between;gap:10px;
    }
    .sectionTitle h3{margin:0;color:#254f65;font-size:19px}
    .sectionTitle small{color:#6d8794}
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .cardBtn{
      cursor:pointer;
      border:1px solid #d5ecf8;
      background:var(--card);
      border-radius:24px;
      padding:18px 15px;
      min-height:130px;
      box-shadow:0 8px 22px rgba(62,122,160,.11);
      transition:.18s ease;
      text-align:left;
      position:relative;
      overflow:hidden;
    }
    .cardBtn:active{transform:scale(.985)}
    .cardBtn:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(62,122,160,.17)}
    .cardBtn .icon{font-size:32px;margin-bottom:9px}
    .cardBtn h4{margin:0;color:#264e64;font-size:18px}
    .cardBtn p{margin:7px 0 0;color:#6b8592;font-size:13px;line-height:1.45}
    .cardBtn .tag{position:absolute;right:12px;top:12px;background:#ecf8ff;border:1px solid #d3ecfa;border-radius:999px;padding:4px 8px;font-size:12px;color:#4280a3;font-weight:700}
    .cards2{
      display:grid;grid-template-columns:1.05fr .95fr;gap:12px;
      margin-bottom:16px;
    }
    .panel{
      background:rgba(255,255,255,.86);
      border:1px solid #d6edf8;
      border-radius:26px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .list{display:grid;gap:10px;margin-top:10px}
    .item{
      display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid #e1f1f8;border-radius:18px;padding:12px;
    }
    .time{
      flex:0 0 auto;background:#e8f7ff;color:#28739b;border-radius:13px;padding:7px 9px;font-weight:800;font-size:13px;
    }
    .item h5{margin:0;font-size:15px;color:#2a4b5d}.item p{margin:4px 0 0;color:#708996;font-size:13px;line-height:1.45}
    .dueTabs{display:flex;gap:8px;margin:8px 0 12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:700;color:#52819b;cursor:pointer}.tab.active{background:#52addd;color:white;border-color:#52addd}
    .footerNav{
      position:fixed;left:50%;bottom:12px;transform:translateX(-50%);
      width:min(520px,calc(100% - 24px));
      display:flex;justify-content:space-around;gap:8px;
      background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
      border:1px solid #d5edf9;border-radius:24px;padding:8px;box-shadow:0 12px 26px rgba(53,112,150,.18);
      z-index:40;
    }
    .footerNav button{border:0;background:transparent;border-radius:16px;padding:8px 10px;color:#52788c;font-weight:800;cursor:pointer}.footerNav button.active{background:#e9f8ff;color:#2181b3}
    .modalMask{position:fixed;inset:0;background:rgba(18,42,58,.32);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:12px}.modalMask.show{display:flex}.modal{width:min(660px,100%);max-height:86vh;overflow:auto;background:white;border-radius:28px;padding:18px;box-shadow:0 20px 50px rgba(20,60,80,.28)}
    .modalHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.modalHeader h3{margin:0;color:#244f66}.x{border:0;background:#eff8fd;border-radius:14px;padding:8px 11px;cursor:pointer;font-weight:900;color:#47758c}
    label{display:block;font-weight:800;color:#355e73;margin:12px 0 6px}input,textarea,select{width:100%;border:1px solid #cfe7f3;border-radius:16px;padding:12px 13px;font-size:16px;background:#fbfeff}textarea{min-height:92px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:12px 14px;font-size:16px;font-weight:900;cursor:pointer;background:#54addc;color:white}.btn.secondary{background:#edf8fe;color:#347da3;border:1px solid #ccecf9}.btn.warn{background:#ffcf71;color:#704700}.btnRow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.checkGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}.check{background:#f5fbff;border:1px solid #d7edf8;border-radius:16px;padding:10px;display:flex;gap:8px;align-items:center}.check input{width:auto}.note{background:#fff9e9;border:1px solid #ffe4a5;border-radius:18px;padding:12px;color:#755d2d;font-size:14px;line-height:1.55}.toast{position:fixed;left:50%;top:94px;transform:translateX(-50%);background:#24536b;color:white;border-radius:999px;padding:12px 16px;font-weight:800;box-shadow:0 12px 24px rgba(30,70,90,.24);display:none;z-index:120}.toast.show{display:block;animation:fade 2.8s ease forwards}@keyframes fade{0%{opacity:0;transform:translate(-50%,-8px)}12%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-8px)}}
    .alarm{display:none;background:#ffeef0;border:1px solid #ffc6cc;border-radius:22px;padding:14px;margin-top:12px;color:#8b2632}.alarm.show{display:block;animation:pulse .8s ease infinite alternate}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.01)}}

    .noticeBoard{
      background:rgba(255,255,255,.88);
      border:1px solid #d6edf8;
      border-radius:26px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .noticeSummary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:12px 0;
    }
    .summaryBox{
      background:#f5fbff;
      border:1px solid #d7edf8;
      border-radius:18px;
      padding:12px;
      text-align:center;
    }
    .summaryBox strong{
      display:block;
      color:#1f6f99;
      font-size:22px;
      line-height:1.1;
    }
    .summaryBox span{
      color:#648291;
      font-size:12px;
      font-weight:800;
    }
    .noticeItem{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      background:#fff;
      border:1px solid #e1f1f8;
      border-radius:20px;
      padding:12px;
      margin-top:10px;
    }
    .noticeItem h5{margin:0;color:#2a4b5d;font-size:15px}
    .noticeItem p{margin:5px 0 0;color:#708996;font-size:13px;line-height:1.45}
    .progress{
      height:9px;
      background:#e8f7ff;
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }
    .progress span{
      display:block;
      height:100%;
      background:linear-gradient(90deg,#52addd,#84d0f3);
      border-radius:999px;
    }
    .miniBtn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;
      border:0;
      background:#54addc;
      color:white;
      border-radius:999px;
      padding:10px 13px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }
    .miniBtn.secondary{
      background:#edf8fe;
      color:#347da3;
      border:1px solid #ccecf9;
    }
    .personRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:9px 0;
      border-top:1px dashed #d7edf8;
      color:#395d70;
      font-weight:800;
      font-size:14px;
    }
    .personRow:first-child{border-top:0}
    .statusOk{color:#24885c}
    .statusMiss{color:#d04d5c}
    .hintBox{background:#f5fbff;border:1px solid #d7edf8;border-radius:18px;padding:12px;color:#426475;font-size:14px;line-height:1.6;font-weight:800;margin:10px 0}
    .miniGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
    .miniCard{background:#fff;border:1px solid #d7edf8;border-radius:16px;padding:10px;color:#395d70;font-weight:850;font-size:13px;line-height:1.45}
    .miniCard b{display:block;color:#24536b;font-size:14px;margin-bottom:3px}


    .optionRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#f8fcff;border:1px solid #d7edf8;border-radius:16px;padding:8px;margin-top:8px}
    .filePreview{display:grid;gap:8px;margin-top:8px}
    .fileChip{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f5fbff;border:1px solid #d7edf8;border-radius:14px;padding:9px 10px;color:#355e73;font-weight:800;font-size:13px}

    @media(max-width:760px){.topbar{align-items:flex-start}.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.cards2{grid-template-columns:1fr}.clock{display:block;min-width:130px;font-size:16px;padding:8px 10px}.clock .dateLine{font-size:19px}.clock .timeLine{font-size:30px}.brand h1{font-size:18px}.welcome h2{font-size:23px}.cardBtn{min-height:122px}.row{grid-template-columns:1fr}}
    @media(max-width:420px){.app{padding:12px 10px 34px}.topbar{border-radius:24px;display:grid;grid-template-columns:50px 1fr;gap:10px}.clock{grid-column:1/3;width:100%;text-align:center}.logo{width:50px;height:50px;font-size:28px}.grid{gap:10px}.cardBtn{padding:15px 12px;border-radius:21px}.cardBtn h4{font-size:16px}.cardBtn p{font-size:12px}.checkGrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <main class="app" id="home">
    <header class="topbar">
      <div class="logo">🏰</div>
      <div class="brand">
        <h1>Heremay 和美智慧校園</h1>
        <p>智慧秘書中心｜通知確認與追蹤整合｜v11</p>
      </div>
      <div class="clock" id="clock">--</div>
    </header>

    <div class="sectionTitle">
      <h3>今日智慧任務</h3><small>今天要提醒、要發送、要追蹤的事項</small>
    </div>
    <section class="cards2">
      <div class="panel">
        <div class="btnRow" style="margin-top:0"><button class="btn secondary" onclick="demoAlarm()">測試提醒鈴聲</button></div>
        <div class="alarm" id="alarmBox">🔔 提醒：10:00 巡堂管理｜請開始上午巡堂。</div>
        <div class="list" id="todayList"></div>
      </div>
      <div class="panel">
        <h3 style="margin:0;color:#254f65">即將到期</h3>
        <div class="dueTabs"><button class="tab active" onclick="setDue('1',this)">未來一天</button><button class="tab" onclick="setDue('3',this)">未來三天</button></div>
        <div class="list" id="dueList"></div>
      </div>
    </section>


    <div class="sectionTitle">
      <h3>通知追蹤</h3><small>智慧任務發送後，可查看已收到與未確認</small>
    </div>
    <section class="noticeBoard">
      <div class="noticeSummary">
        <div class="summaryBox"><strong id="noticeTotal">2</strong><span>今日公告</span></div>
        <div class="summaryBox"><strong id="ackTotal">7</strong><span>已收到人次</span></div>
        <div class="summaryBox"><strong id="missTotal">5</strong><span>未確認人次</span></div>
      </div>
      <div id="noticeTrackList"></div>
    </section>

    <div class="sectionTitle">
      <h3>智慧秘書中心</h3><small>整合排程提醒、通知、已收到追蹤與再次提醒；專案計畫稍後再做</small>
    </div>
    <section class="grid">
      <button class="cardBtn" onclick="openModal('smartTask')"><span class="tag">核心</span><div class="icon">🤖</div><h4>新增智慧任務</h4><p>整合個人提醒、通知他人、通知＋已收到確認。</p></button>
      <button class="cardBtn" onclick="openModal('taskTrack')"><span class="tag">追蹤</span><div class="icon">📣</div><h4>通知追蹤</h4><p>查看已收到、未確認，並提醒尚未確認的人員。</p></button>
      <button class="cardBtn" onclick="openModal('project')"><span class="tag">暫緩</span><div class="icon">📁</div><h4>專案計畫</h4><p>畢業典禮、聖誕晚會等大型計畫，先保留入口。</p></button>
      <button class="cardBtn" onclick="location.href='patrol.html'"><span class="tag">進入</span><div class="icon">📋</div><h4>巡堂與紀錄</h4><p>上午／下午巡堂、拍照、缺失追蹤與週報表。</p></button>
      <button class="cardBtn" onclick="openModal('inspection')"><span class="tag">新增</span><div class="icon">🛝</div><h4>定期安全衛生巡檢</h4><p>遊樂設施、飲用水、水塔清洗等定期檢查與政府查核紀錄。</p></button>
      <button class="cardBtn" onclick="openModal('system')"><div class="icon">⚙️</div><h4>系統管理</h4><p>人員、班級、群組、提醒時間與權限設定。</p></button>
    </section>

    <div class="sectionTitle">
      <h3>獨立模組入口</h3><small>不併入智慧秘書中心，避免權責混在一起</small>
    </div>
    <section class="grid">
      <button class="cardBtn" onclick="openModal('register')"><span class="tag">獨立</span><div class="icon">📝</div><h4>登記中心</h4><p>每位同仁都可成為主要執行者，也可作為回覆／調查對象。</p></button>
    </section>

  </main>

  <div class="modalMask" id="modalMask" onclick="maskClose(event)">
    <section class="modal" id="modal"></section>
  </div>

<script>
const SERVICE_URL = 'https://script.google.com/macros/s/AKfycbzbZ6r6c8XjHuKad0U5TIJXr8i141fCBwNJcVsKnoGa1-NXG_JOzapeRF5cVlnGI4F7/exec';

function postToService(fields){
  const iframeName = `heremayAdminFrame_${Date.now()}`;

  const iframe = document.createElement('iframe');
  iframe.name = iframeName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SERVICE_URL;
  form.target = iframeName;
  form.style.display = 'none';

  Object.entries(fields).forEach(([name, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = String(value ?? '');
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    form.remove();
    iframe.remove();
  }, 15000);
}

const reminders = [
  {time:'08:30', title:'只提醒自己｜晨間行政確認', text:'查看今日請假、人力與園務提醒。'},
  {time:'09:00', title:'通知他人｜中午會議通知', text:'自動通知應參加人員：今天中午要開會。'},
  {time:'13:25', title:'通知＋已收到｜會前提醒', text:'提醒參加會議的人到辦公室，攜帶筆記本與筆。'},
  {time:'14:30', title:'只提醒自己｜下午巡堂管理', text:'依班級順序進行下午巡堂。'}
];
const due1 = [
  {time:'明天', title:'廚房設備維修回覆', text:'確認主任是否已完成紗窗／設備修繕安排。'},
  {time:'明天', title:'便當登記截止', text:'統計葷素與數量。'}
];
const due3 = [
  ...due1,
  {time:'3天內', title:'招生文宣專案', text:'檢查海報與網站內容更新進度。'},
  {time:'3天內', title:'環境安全檢查', text:'彙整本週巡堂待改善項目。'}
];
function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const d=new Date(); const days=['日','一','二','三','四','五','六'];
  document.getElementById('clock').innerHTML=`<div class="dateLine">${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}（週${days[d.getDay()]}）</div><div class="timeLine">${pad(d.getHours())}:${pad(d.getMinutes())}</div>`;
}
setInterval(tick,1000); tick();
function renderToday(){
  const el=document.getElementById('todayList');
  el.innerHTML=reminders.sort((a,b)=>a.time.localeCompare(b.time)).map(r=>`<div class="item"><div class="time">${r.time}</div><div><h5>${r.title}</h5><p>${r.text}</p></div></div>`).join('');
}
function setDue(type,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  const data=type==='1'?due1:due3;
  document.getElementById('dueList').innerHTML=data.map(r=>`<div class="item"><div class="time">${r.time}</div><div><h5>${r.title}</h5><p>${r.text}</p></div></div>`).join('');
}
renderToday(); setDue('1',document.querySelector('.tab'));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show')}
function beep(){
  try{const ctx=new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.type='sine'; osc.frequency.value=880; gain.gain.setValueAtTime(.001,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.18,ctx.currentTime+.03); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+.48);}catch(e){}
}
function demoAlarm(){document.getElementById('alarmBox').classList.add('show');beep();showToast('提醒測試：已跳出文字與鈴聲')}
function scrollTopFast(){window.scrollTo({top:0,behavior:'smooth'})}
function maskClose(e){if(e.target.id==='modalMask') closeModal()}
function closeModal(){document.getElementById('modalMask').classList.remove('show')}
function openModal(type){
  const content={
    smartTask:`<div class="modalHeader"><h3>🤖 新增智慧任務</h3><button class="x" onclick="closeModal()">關閉</button></div>

function setRegisterMode(mode){
  const cb=document.getElementById('checkboxModeBox');
  const qty=document.getElementById('quantityModeBox');
  if(cb) cb.style.display = mode==='checkbox' ? '' : 'none';
  if(qty) qty.style.display = mode==='quantity' ? '' : 'none';
}
function addQtyItem(name='', count=1){
  const box=document.getElementById('regQtyItems');
  if(!box) return;
  const div=document.createElement('div');
  div.className='optionRow';
  div.innerHTML=`<input class="qtyItemName" placeholder="項目名稱，例如：排骨便當" value="${name}"><input class="qtyItemCount" type="number" min="0" value="${count}" placeholder="數量" style="max-width:110px"><button class="miniBtn secondary" onclick="removeQtyItem(this)">移除</button>`;
  box.appendChild(div);
}
function removeQtyItem(btn){
  const row=btn.closest('.optionRow');
  const box=document.getElementById('regQtyItems');
  if(row && box && box.children.length>1) row.remove();
  else showToast('至少保留一個項目');
}
function fillQtyItems(items){
  const box=document.getElementById('regQtyItems');
  if(!box) return;
  box.innerHTML='';
  items.forEach(it=>addQtyItem(it[0], it[1]||0));
}
function chooseRegisterMode(mode){
  const radio=document.querySelector(`input[name="regMode"][value="${mode}"]`);
  if(radio) radio.checked=true;
  setRegisterMode(mode);
}
function setCompanionBox(show){
  const box=document.getElementById('companionBox');
  if(box) box.style.display = show ? '' : 'none';
}

function addRegOption(text=''){
  const box=document.getElementById('regOptions');
  if(!box) return;
  const div=document.createElement('div');
  div.className='optionRow';
  div.innerHTML=`<input placeholder="請輸入選項文字" value="${text}"><button class="miniBtn secondary" onclick="removeRegOption(this)">移除</button>`;
  box.appendChild(div);
}
function removeRegOption(btn){
  const row=btn.closest('.optionRow');
  const box=document.getElementById('regOptions');
  if(row && box && box.children.length>1) row.remove();
  else showToast('至少保留一個登記選項');
}
function previewRegisterFiles(input){
  const box=document.getElementById('regFilePreview');
  if(!box) return;
  const files=Array.from(input.files||[]);
  box.innerHTML=files.length?files.map(f=>`<div class="fileChip"><span>📎 ${f.name}</span><small>${Math.ceil(f.size/1024)} KB</small></div>`).join(''):'<div class="hintBox">尚未選擇附件</div>';
}

function getRegisterItems(){
  return Array.from(document.querySelectorAll('#regQtyItems .optionRow')).map(row=>{
    const name=row.querySelector('.qtyItemName')?.value?.trim() || '';
    const count=Number(row.querySelector('.qtyItemCount')?.value || 1);
    return [name, Number.isFinite(count)?count:1];
  }).filter(x=>x[0]);
}
function getRegisterTargets(){
  return Array.from(document.querySelectorAll('#regTargets input:checked')).map(x=>x.value);
}
function setRegisterTargets(targets=[]){
  document.querySelectorAll('#regTargets input').forEach(input=>{input.checked = targets.includes(input.value);});
}

    },

      title:'飲料訂購登記',
      companion:false,
      items:[['紅茶',1],['綠茶',1],['青茶',1],['奶茶',1],['咖啡',1]],
      msg:'已帶入飲料模板（項目＋數量，數量預設 1）'
    },
    diningTravel:{
      title:'餐旅活動登記',
      companion:true,

      msg:'已帶入餐旅活動模板（項目＋數量，數量預設 1，含攜伴欄位）'
    },
    groupBuy:{
      title:'團購登記',
      companion:false,
      items:[['品項 A',0],['品項 B',0],['品項 C',0],['其他',0]],
      msg:'已帶入團購模板（品項及數量統計）'
    },
    training:{
      title:'研習報名登記',
      companion:false,
      items:[['參加',1],['不克參加',1],['需要研習證明',1],['需要公假登記',1],['需要代課協助',1]],
      msg:'已帶入研習模板（項目＋數量，數量預設 1）'
    }
  };
  const t=templates[type];
  if(!t) return;
  const title=document.getElementById('regTitle');

function getCommonTemplates(){
  try{return JSON.parse(localStorage.getItem('heremay_common_register_templates')||'[]');}
  catch(e){return [];}
}
function saveCommonTemplates(list){
  localStorage.setItem('heremay_common_register_templates', JSON.stringify(list));
}
function renderCommonTemplates(){
  const select=document.getElementById('commonTemplateSelect');
  if(!select) return;
  const list=getCommonTemplates();
  select.innerHTML=list.length?list.map((t,i)=>`<option value="${i}">${t.name}</option>`).join(''):'<option value="">尚無常用模板</option>';
}
function saveRegisterAsCommonTemplate(){
  const defaultName=document.getElementById('regTitle')?.value || '常用登記表';
  const name=prompt('請輸入常用模板名稱，例如：阿明便當、50嵐飲料、制服團購', defaultName);
  if(!name) return;
  const data={
    name,
    host:document.getElementById('regHost')?.value || '',
    title:document.getElementById('regTitle')?.value || '',
    desc:document.getElementById('regDesc')?.value || '',
    targets:getRegisterTargets(),
    items:getRegisterItems(),
    companion:document.getElementById('companionBox')?.style.display !== 'none'
  };
  const list=getCommonTemplates();
  const existing=list.findIndex(t=>t.name===name);
  if(existing>=0) list[existing]=data; else list.push(data);
  saveCommonTemplates(list);
  renderCommonTemplates();
  showToast('已儲存為常用模板：'+name);
}
function loadCommonRegisterTemplate(){
  const select=document.getElementById('commonTemplateSelect');
  if(!select || select.value==='') return showToast('目前沒有可套用的常用模板');
  const t=getCommonTemplates()[Number(select.value)];
  if(!t) return;
  const host=document.getElementById('regHost'); if(host) host.value=t.host||host.value;
  const title=document.getElementById('regTitle'); if(title) title.value=t.title||t.name;
  const desc=document.getElementById('regDesc'); if(desc) desc.value=t.desc||'';
  setRegisterTargets(t.targets||[]);
  fillQtyItems(t.items&&t.items.length?t.items:[['項目',1]]);
  setCompanionBox(!!t.companion);
  showToast('已套用常用模板：'+t.name);
}
function deleteCommonRegisterTemplate(){
  const select=document.getElementById('commonTemplateSelect');
  if(!select || select.value==='') return showToast('目前沒有可刪除的常用模板');
  const list=getCommonTemplates();
  const t=list[Number(select.value)];
  if(!t) return;
  if(!confirm('確定刪除常用模板「'+t.name+'」嗎？')) return;
  list.splice(Number(select.value),1);
  saveCommonTemplates(list);
  renderCommonTemplates();
  showToast('已刪除常用模板');
}
function loadTravelSample(){
  loadRegisterTemplate('diningTravel');
}

  const mainText=document.getElementById('mainContentText');
  const type=document.getElementById('taskType')?.value || 'self';
  const mode=document.getElementById('taskDateMode')?.value || 'specific';

function renderNoticeTrack(){
  const list=document.getElementById('noticeTrackList');
  if(!list) return;
  let ackTotal=0, missTotal=0;
  list.innerHTML = noticeTracks.map(n=>{
    const ack=n.people.filter(p=>p.ack).length;
    const total=n.people.length;
    const miss=total-ack;
    ackTotal += ack; missTotal += miss;
    const pct=Math.round(ack/total*100);
    return `<div class="noticeItem">
      <div>
        <h5>${n.must?'🔴':'🔵'} ${n.title}</h5>
        <p>對象：${n.target}｜發布：${n.sent}｜已收到 ${ack}/${total} 人，未確認 ${miss} 人</p>
        <div class="progress"><span style="width:${pct}%"></span></div>
      </div>
      <button class="miniBtn notice-detail-btn" type="button" data-notice-id="${n.id}" onclick="openNoticeFromButton(this)">查看名單</button>
    </div>`;
  }).join('');
  document.getElementById('noticeTotal').textContent = noticeTracks.length;
  document.getElementById('ackTotal').textContent = ackTotal;
  document.getElementById('missTotal').textContent = missTotal;
}

function openNoticeFromButton(button){
  const noticeId = String(button && button.dataset
    ? button.dataset.noticeId || ''
    : '').trim();

  if(!noticeId){
    showToast('找不到公告編號');
    return;
  }

  showNoticeTrack(noticeId);
}


function showNoticeTrack(id){
  const n = noticeTracks.find(x=>x.id===id);
  if(!n) return;
  const ack = n.people.filter(p=>p.ack);
  const miss = n.people.filter(p=>!p.ack);
  document.getElementById('modal').innerHTML = `
    <div class="modalHeader"><h3>公告確認狀態</h3><button class="x" onclick="closeModal()">關閉</button></div>
    <div class="note">
      <strong>${n.title}</strong><br>
      對象：${n.target}｜發布：${n.sent}｜${n.must?'重要公告：需確認':'一般公告：可確認'}
    </div>
    <div class="noticeSummary">
      <div class="summaryBox"><strong>${n.people.length}</strong><span>通知對象</span></div>
      <div class="summaryBox"><strong>${ack.length}</strong><span>已收到</span></div>
      <div class="summaryBox"><strong>${miss.length}</strong><span>未確認</span></div>
    </div>
    <div class="panel" style="box-shadow:none;margin-top:10px">
      <h3 style="margin:0 0 8px;color:#254f65">已收到名單</h3>
      ${ack.map(p=>`<div class="personRow"><span>${p.name}｜${p.group}</span><span class="statusOk">${p.time} 已收到</span></div>`).join('') || '<div class="personRow"><span>尚無</span><span></span></div>'}
    </div>
    <div class="panel" style="box-shadow:none;margin-top:10px">
      <h3 style="margin:0 0 8px;color:#254f65">尚未確認名單</h3>
      ${miss.map(p=>`<div class="personRow"><span>${p.name}｜${p.group}</span><span class="statusMiss">尚未確認</span></div>`).join('') || '<div class="personRow"><span>全部已確認</span><span class="statusOk">✅</span></div>'}
    </div>
    <div class="btnRow"><button class="btn secondary" id="remindBtn" onclick="remindUnconfirmed('${n.id}')">提醒未確認人員</button><button class="btn" onclick="closeModal()">完成</button></div>
  `;
  document.getElementById('modalMask').classList.add('show');
}


let pendingReminderNoticeId = '';

function remindUnconfirmed(noticeId){
  const notice = noticeTracks.find(item => String(item.id) === String(noticeId));

  if(!notice){
    showToast('找不到公告資料');
    return;
  }

  const missing = notice.people.filter(person => !person.ack);

  if(!missing.length){
    showToast('這則公告已全部確認，不需要再次提醒');
    return;
  }

  const button = document.getElementById('remindBtn');
  if(button){
    button.disabled = true;
    button.textContent = '正在送出提醒…';
  }

  let senderName = '主管';
  try{
    const raw = localStorage.getItem('heremay.currentEmployee');
    const employee = raw ? JSON.parse(raw) : null;
    if(employee && employee.name) senderName = employee.name;
  }catch(error){}

  pendingReminderNoticeId = String(notice.id);

  postToService({
    action: 'remindUnconfirmed',
    noticeId: notice.id,
    noticeTitle: notice.title,
    targetType: notice.target,
    senderName: senderName,
    employeeIds: JSON.stringify(missing.map(person => person.employeeId || '')),
    employeeNames: JSON.stringify(missing.map(person => person.name || ''))
  });

  showToast(`正在提醒 ${missing.length} 位尚未確認人員…`);
}

function noticeAudienceForId(noticeId, employees){
  const isTeacher = String(noticeId).startsWith('teacher-');
  const isSupport = String(noticeId).startsWith('support-');

  return employees.filter(employee => {
    const homeType = String(employee.homeType || '').trim();
    if(isTeacher) return homeType === '教保首頁';
    if(isSupport) return homeType === '庶務首頁';
    return false;
  });
}

function buildCloudNoticeTracks(payload){
  const employees = Array.isArray(payload.employees) ? payload.employees : [];
  const records = Array.isArray(payload.records) ? payload.records : [];

  const definitions = [
    {
      id:'teacher-1',
      title:'下午 4:10 請協助整理戶外玩具',
      target:'教保人員',
      sent:'今天 09:10',
      must:true
    },
    {
      id:'teacher-2',
      title:'明日拍攝活動照片提醒',
      target:'全體教保人員',
      sent:'今天 08:20',
      must:false
    },
    {
      id:'support-1',
      title:'今日午餐後請加強廚房地面清潔',
      target:'廚工／清潔人員',
      sent:'今天 09:05',
      must:true
    },
    {
      id:'support-2',
      title:'清潔用品本週五前完成盤點',
      target:'庶務工作',
      sent:'今天 08:30',
      must:false
    }
  ];

  return definitions.map(def => {
    const audience = noticeAudienceForId(def.id, employees);
    const ackRecords = records.filter(record => record.noticeId === def.id);

    const people = audience.map(employee => {
      const record = ackRecords.find(item =>
        (employee.employeeId && item.employeeId === employee.employeeId) ||
        item.employeeName === employee.name
      );

      return {
        employeeId: employee.employeeId || '',
        name: employee.name,
        group: employee.group || employee.jobTitle || '',
        ack: Boolean(record),
        time: record ? record.confirmedAt : ''
      };
    });

    // Keep any cloud record whose employee is no longer in the enabled employee list.
    ackRecords.forEach(record => {
      if(!people.some(person => person.name === record.employeeName)){
        people.push({
          employeeId: record.employeeId || '',
          name: record.employeeName,
          group: '紀錄保留',
          ack: true,
          time: record.confirmedAt
        });
      }
    });

    return {...def, people};
  });
}

window.addEventListener('message', event => {
  const data = event.data || {};
  const payload = data.payload || {};

  if(data.type === 'HEREMAY_REMIND_RESULT'){
    const button = document.getElementById('remindBtn');

    if(button){
      button.disabled = false;
      button.textContent = '提醒未確認人員';
    }

    if(!payload.ok){
      showToast(payload.message || '再次提醒送出失敗');
      return;
    }

    showToast(`✅ ${payload.message || '已送出再次提醒'}`);

    if(button){
      button.textContent = '已送出提醒';
      button.disabled = true;
    }

    pendingReminderNoticeId = '';
    return;
  }

  if(data.type !== 'HEREMAY_ACK_RECORDS_RESULT') return;

  if(!payload.ok){
    showToast(payload.message || '無法載入雲端公告紀錄');
    return;
  }

  noticeTracks = buildCloudNoticeTracks(payload);
  renderNoticeTrack();
  showToast('已載入最新公告確認紀錄');
});

function loadCloudAckRecords(){
  postToService({action:'getAckRecords'});
}

renderNoticeTrack();
loadCloudAckRecords();
