<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f8ff">
<title>Heremay 和美智慧校園｜團購報名中心 v1.5</title>
<style>
:root{
  --bg:#f4f8ff;--card:#fff;--blue:#2f68d8;--deep:#173f75;--line:#dce7f5;
  --muted:#6f8298;--green:#2ca86b;--orange:#ef7b28;--red:#d94d59;
  --shadow:0 10px 28px rgba(45,82,132,.11);--radius:24px;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:linear-gradient(180deg,#f8fbff,#edf5ff 55%,#fbfdff);color:#203b61}
.app{width:min(980px,100%);margin:auto;padding:14px 12px 90px}
.header{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;padding:8px 4px 16px}
.logo{width:64px;height:64px;border-radius:20px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
.logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.header small{display:block;color:#607b98;font-weight:800}
.header h1{margin:2px 0 0;font-size:30px;color:var(--deep)}
.back{border:1px solid #cfe0f5;background:#fff;color:var(--blue);border-radius:16px;padding:11px 14px;font-size:15px;font-weight:900;cursor:pointer}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.tab{border:1px solid #d8e6f6;background:#fff;color:#57738f;border-radius:16px;padding:12px 8px;font-weight:900;cursor:pointer}
.tab.active{background:#2f68d8;color:#fff;border-color:#2f68d8}
.panel{display:none}.panel.active{display:block}
.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:13px;box-shadow:var(--shadow)}
.card h2{margin:0 0 12px;color:var(--deep);font-size:23px}
.card h3{margin:16px 0 8px;color:#244e7c}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;margin:10px 0 6px;font-weight:900;color:#355d88}
input,textarea,select{width:100%;border:1px solid #cedff2;border-radius:15px;padding:12px 13px;font-size:16px;background:#fcfeff;color:#203b61}
input[type="number"]{-moz-appearance:textfield;appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
textarea{min-height:95px;resize:vertical}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
.btn{border:0;border-radius:16px;padding:12px 16px;font-size:16px;font-weight:900;cursor:pointer;background:var(--blue);color:#fff}
.btn.secondary{background:#edf4ff;color:var(--blue);border:1px solid #cfe0f5}
.btn.danger{background:#fff0f1;color:var(--red);border:1px solid #ffd0d4}
.btn:disabled{opacity:.45;cursor:not-allowed}
.hint{background:#f5f9ff;border:1px solid #d8e6f6;border-radius:16px;padding:11px;color:#56718d;line-height:1.55;font-weight:800;font-size:14px;margin:8px 0}
.templateGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.templateCategoryGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}
.templateCategoryBox{display:grid;gap:8px}
.savedUnderTemplate{display:grid;gap:7px}
.savedUnderTemplate:empty{display:none}
.savedUnderTemplate .templateSaved{grid-template-columns:1fr;padding:9px}
.savedUnderTemplate .actions{margin-top:6px}
.savedUnderTemplate .btn{padding:8px 10px;font-size:14px}
.templateBtn{border:1px solid #d8e6f6;background:#fff;border-radius:16px;padding:12px 8px;font-weight:900;color:#315f91;cursor:pointer}
.templateBtn.active{background:#eaf2ff;border-color:#8fb2ea;color:#174eaa}
.templatePicker{margin-top:12px;border:1px solid #cfe0f5;border-radius:20px;padding:14px;background:#f8fbff}
.templatePickerHead{display:flex;justify-content:space-between;gap:10px;align-items:center}
.templatePickerHead h3{margin:0;color:#173f75}
.templatePickerList{display:grid;gap:8px;margin-top:10px}
.templateChoice{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid #dce8f7;border-radius:16px;padding:11px}
.templateChoice strong{display:block;color:#204f83}
.templateChoice small{color:#71879d;font-weight:800}
.newTemplateChoice{border:2px dashed #9cbce6;background:#f4f8ff}
.checkGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.check{display:flex;gap:7px;align-items:center;background:#f8fbff;border:1px solid #dce8f7;border-radius:14px;padding:10px;font-weight:850}
.check input{width:auto}
.productEditor{border:1px solid #dce8f7;border-radius:20px;padding:14px;margin-top:12px;background:#fbfdff}
.productTop{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.productTop h3{margin:0}
.specList,.prefList{display:grid;gap:8px;margin-top:8px}
.specRow{display:grid;grid-template-columns:1fr 130px auto;gap:8px;align-items:center}
.prefRow{display:grid;grid-template-columns:1fr 140px 1.5fr auto;gap:8px;align-items:center}
.fileList{display:grid;gap:8px;margin-top:10px}
.fileChip{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid #dce8f7;border-radius:14px;padding:10px;background:#fff}
.fileChip strong{display:block;font-size:14px;word-break:break-all}.fileChip small{color:var(--muted)}
.eventCard{border:1px solid #dce8f7;border-radius:21px;padding:15px;background:#fff;margin-top:10px}
.campaignList{display:grid;gap:10px}
.campaignSummary{border:1px solid #dce8f7;border-radius:20px;padding:14px;background:#fff}
.campaignSummary h3{margin:0;color:#173f75}
.summaryActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.templateSaved{border:1px solid #dce8f7;border-radius:16px;padding:11px;background:#fbfdff;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}

.eventCard h3{margin:0;color:#173f75}
.meta{font-size:13px;color:#71879d;font-weight:800;line-height:1.55;margin-top:6px}
.counter{display:inline-flex;gap:8px;align-items:center;background:#fff5e9;border:1px solid #ffddb3;border-radius:999px;padding:7px 11px;font-weight:900;color:#99531d;margin-top:8px}
.productCard{border-top:1px dashed #dce8f7;padding-top:12px;margin-top:12px}
.productHead{display:flex;justify-content:space-between;gap:10px;align-items:center}
.productName{font-size:18px;font-weight:950;color:#173f75}
.optionBlock{margin-top:8px}
.optionLabel{font-size:14px;font-weight:900;color:#45688d;margin-bottom:5px}
.choiceGrid{display:flex;gap:8px;flex-wrap:wrap}
.choice{border:1px solid #d4e2f4;background:#f8fbff;border-radius:999px;padding:8px 11px;font-weight:850;cursor:pointer}
.choice input{width:auto;margin-right:5px}
.qtyGrid{display:grid;grid-template-columns:110px 1fr;gap:10px;margin-top:10px}
.totalBox{margin-top:12px;background:#fff7e8;border:1px solid #ffdcae;border-radius:18px;padding:13px;font-size:20px;font-weight:950;color:#9b5419}
.publicTable{width:100%;border-collapse:collapse;margin-top:10px}
.publicTable th,.publicTable td{border:1px solid #dbe7f4;padding:9px;text-align:left;vertical-align:top}
.publicTable th{background:#edf4ff;color:#285a9f}
.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}
.badge.ok{background:#eaf8ef;color:#238558}
.badge.no{background:#fff0f1;color:#c1434f}
.badge.wait{background:#fff4df;color:#b46617}
.empty{text-align:center;padding:28px;color:var(--muted);font-weight:850;background:#f8fbff;border-radius:18px;border:1px dashed #ccdced}
.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#173f75;color:#fff;border-radius:999px;padding:11px 16px;font-weight:900;opacity:0;pointer-events:none;transition:.25s;z-index:30}
.toast.show{opacity:1}
.version{text-align:center;color:#7890a6;font-size:12px;font-weight:800;margin-top:10px}
.syncBar{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#eef7ff;border:1px solid #cfe3fa;border-radius:16px;padding:10px 12px;margin-bottom:13px;color:#315f91;font-weight:900}
.syncState{display:flex;align-items:center;gap:8px}
.syncDot{width:10px;height:10px;border-radius:50%;background:#ef9d28;box-shadow:0 0 0 4px rgba(239,157,40,.13)}
.syncDot.ok{background:#2ca86b;box-shadow:0 0 0 4px rgba(44,168,107,.13)}
.syncDot.bad{background:#d94d59;box-shadow:0 0 0 4px rgba(217,77,89,.13)}
.syncRefresh{border:1px solid #c9dcf5;background:#fff;color:#2f68d8;border-radius:12px;padding:8px 11px;font-weight:900;cursor:pointer}

@media(max-width:760px){
  .header{grid-template-columns:54px 1fr}.logo{width:54px;height:54px}.back{grid-column:1/3;width:100%}
  .tabs{grid-template-columns:repeat(2,1fr)}.row,.specRow,.prefRow,.qtyGrid{grid-template-columns:1fr}
  .templateGrid,.templateCategoryGrid{grid-template-columns:repeat(2,1fr)}.checkGrid{grid-template-columns:1fr}.header h1{font-size:27px}
}
</style>
</head>
<body>
<main class="app">
<header class="header">
  <div class="logo"><img src="assets/logo.png?v=20260720-groupbuy-v11" alt="和美智慧校園 Logo" onerror="this.parentElement.textContent='🏰'"></div>
  <div><small>Heremay 和美智慧校園</small><h1>🛒 團購／報名中心</h1></div>
  <button class="back" type="button" onclick="goBack()">← 返回上一頁</button>
</header>

<nav class="tabs">
  <button class="tab active" onclick="showPanel('available',this)">可參加</button>
  <button class="tab" onclick="showPanel('create',this)">發起活動</button>
  <button class="tab" onclick="showPanel('mine',this)">我的回覆</button>
  <button class="tab" onclick="showPanel('stats',this)">統計／結單</button>
</nav>

<div class="syncBar">
  <div class="syncState"><span class="syncDot" id="syncDot"></span><span id="syncText">正在連接雲端資料…</span></div>
  <button class="syncRefresh" type="button" onclick="manualCloudRefresh()">重新同步</button>
</div>

<section id="available" class="panel active">
  <div class="card"><h2>目前可參加的團購／活動</h2><div id="availableList"></div></div>
</section>

<section id="create" class="panel">
  <div class="card">
    <h2>選擇模板</h2>
    <div class="templateGrid">
      <button class="templateBtn active" onclick="openTemplatePicker('drink',this)">🥤 飲料</button>
      <button class="templateBtn" onclick="openTemplatePicker('meal',this)">🍱 餐點</button>
      <button class="templateBtn" onclick="openTemplatePicker('goods',this)">📦 一般商品</button>
      <button class="templateBtn" onclick="openTemplatePicker('travel',this)">🚌 旅遊／聚餐</button>
      <button class="templateBtn" onclick="openTemplatePicker('training',this)">📚 研習／活動</button>
    </div>

    <div id="templatePicker" class="templatePicker" style="display:none">
      <div class="templatePickerHead">
        <h3 id="templatePickerTitle">選擇模板</h3>
        <button class="btn secondary" type="button" onclick="closeTemplatePicker()">關閉</button>
      </div>
      <div id="templatePickerList" class="templatePickerList"></div>
    </div>

    <div id="selectedTemplateNotice" class="hint">目前使用：飲料系統模板</div>

    <div class="row">
      <div><label>活動名稱</label><input id="campaignTitle" placeholder="例如：下午茶飲料團購"></div>
      <div><label>主辦人</label><input id="hostName"></div>
    </div>
    <label>活動說明</label><textarea id="campaignDesc"></textarea>
    <div class="row">
      <div><label>截止日期</label><input id="deadlineDate" type="date"></div>
      <div><label>截止時間</label><input id="deadlineTime" type="time" value="17:00"></div>
    </div>

    <label>開放對象</label>
    <div class="checkGrid" id="targets">
      <label class="check"><input type="checkbox" value="全體" checked>全體</label>
      <label class="check"><input type="checkbox" value="行政">行政</label>
      <label class="check"><input type="checkbox" value="教保">教保</label>
      <label class="check"><input type="checkbox" value="庶務">庶務</label>
    </div>

    <div class="row">
      <div><label>參加者可查看他人內容</label>
        <select id="visibility">
          <option value="private">不公開，只有主辦人可看</option>
          <option value="status">公開姓名與參加狀態</option>
          <option value="full">公開完整登記內容</option>
        </select>
      </div>
      <div><label>是否必須回覆</label>
        <select id="replyRequired"><option value="no">否</option><option value="yes">是，必須選參加或不參加</option></select>
      </div>
    </div>

    <div class="row">
      <div><label>總人數上限（0＝不限）</label><input id="capacity" type="number" min="0" value="0" inputmode="numeric"></div>
      <div><label>候補機制</label><select id="waitlist"><option value="off">不啟用</option><option value="on">額滿後自動候補</option></select></div>
    </div>
    <div class="row">
      <div><label>每人最多攜伴</label><input id="maxCompanion" type="number" min="0" value="0" inputmode="numeric"></div>
      <div><label>名額計算方式</label><select id="capacityMode"><option value="people">本人＋攜伴都計入</option><option value="registrations">只計報名筆數</option></select></div>
    </div>
    <div class="row">
      <div><label>建議保存方式</label>
        <select id="retentionMode">
          <option value="delete">短期活動：結束後通常不必長期保存</option>
          <option value="keep">重要活動：建議保留報名與統計紀錄</option>
        </select>
      </div>
      <div><label>說明</label><div class="hint" style="margin:0">這只是提醒；活動結束後仍可選擇保留或永久刪除。</div></div>
    </div>

    <label>附件：圖片與 PDF，可分批累加</label>
    <input id="attachments" type="file" accept="image/*,.pdf" multiple>
    <div id="fileList" class="fileList"></div>

    <h2 style="margin-top:18px">本次開放品項</h2>
    <div class="hint">只建立這次要提供的少數品項。每個品項分成「價格規格」與「免費偏好」。</div>
    <div id="productEditors"></div>
    <div class="actions"><button class="btn secondary" onclick="addProductEditor()">＋新增下一個品項</button></div>

    <div id="editNotice" class="hint" style="display:none">✏️ 正在編輯既有活動；儲存後會更新原活動，不會新增另一份。</div>
    <div class="actions">
      <button class="btn" id="saveCampaignBtn" onclick="createCampaign()">建立活動</button>
      <button class="btn secondary" onclick="saveCurrentAsTemplate()">儲存為我的模板</button>
      <button class="btn secondary" onclick="resetForm()">清除表單</button>
      <button class="btn secondary" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">取消編輯</button>
    </div>
  </div>
</section>

<section id="mine" class="panel">
  <div class="card"><h2>我的回覆與訂購</h2><div id="myOrders"></div></div>
</section>

<section id="stats" class="panel">
  <div class="card"><h2>主辦人統計與結單</h2><div id="statsList"></div></div>
</section>

<div class="version">團購／報名中心 v1.5｜2026-07-21｜活動、訂單與模板雲端同步</div>
</main>
<div class="toast" id="toast"></div>

<script>
const SERVICE_URL='https://script.google.com/macros/s/AKfycbyGOxpeqwRU3_Q2HcoQHsMr_PvUkoLkpRwPPCLs5K6iWRye7fVeQdNkMAvc1oBvqFFrpw/exec';
const CK='heremay.groupbuy.cloud.campaigns.v15', OK='heremay.groupbuy.cloud.orders.v15', TK='heremay.groupbuy.cloud.templates.v15';
let pendingFiles=[], activeTemplate='drink', editingCampaignId='', openedCampaignId='', pickerCategory='drink';
let cloudBusy=false;

const templateCategoryNames={
 drink:'🥤 飲料類常用模板',
 meal:'🍱 餐點類常用模板',
 goods:'📦 一般商品類常用模板',
 travel:'🚌 旅遊／聚餐類常用模板',
 training:'📚 研習／活動類常用模板'
};

const templates={
 drink:{title:'飲料團購',desc:'請選擇飲品、杯型、冷熱、甜度與冰量。',required:false,visibility:'full',capacity:0,waitlist:'off',maxCompanion:0,
 products:[{name:'珍珠奶茶',specs:[['中杯',50],['大杯',60]],prefs:[['冷熱','單選','冷,熱'],['甜度','單選','正常,少糖,半糖,微糖,無糖'],['冰量','單選','正常冰,少冰,微冰,去冰']]}]},
 meal:{title:'餐點團購',desc:'請選擇餐點、份量與口味。',required:false,visibility:'full',capacity:0,waitlist:'off',maxCompanion:0,
 products:[{name:'雞排',specs:[['一般',75],['加大',95]],prefs:[['辣度','單選','不辣,小辣,中辣,大辣'],['口味','單選','原味,梅粉,海苔'],['切法','單選','切,不切']]}]},
 goods:{title:'一般商品團購',desc:'請選擇商品規格、顏色、尺寸與數量。',required:false,visibility:'private',capacity:0,waitlist:'off',maxCompanion:0,
 products:[{name:'商品 A',specs:[['基本款',100]],prefs:[['顏色','單選','紅,藍,黑'],['尺寸','單選','S,M,L,XL']]}]},
 travel:{title:'旅遊／聚餐報名',desc:'每位受邀者都要回覆參加或不參加。名額依成功送出時間排序。',required:true,visibility:'status',capacity:40,waitlist:'on',maxCompanion:1,
 products:[{name:'活動報名',specs:[['本人參加',0]],prefs:[['餐食','單選','葷食,素食'],['交通','單選','搭車,自行前往'],['其他需求','文字','']]}]},
 training:{title:'研習／活動報名',desc:'請選擇參加場次與餐食。',required:true,visibility:'status',capacity:30,waitlist:'on',maxCompanion:0,
 products:[{name:'研習報名',specs:[['上午場',0],['下午場',0]],prefs:[['餐食','單選','葷食,素食,不需要'],['需要研習時數','單選','需要,不需要']]}]}
};

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),1500)}
function currentEmployee(){try{return JSON.parse(localStorage.getItem('heremay.currentEmployee')||'{}')}catch(e){return {}}}
function currentName(){return currentEmployee().name||'目前使用者'}
function getC(){try{return JSON.parse(localStorage.getItem(CK)||'[]')}catch(e){return []}}
function setC(v){localStorage.setItem(CK,JSON.stringify(v))}
function getO(){try{return JSON.parse(localStorage.getItem(OK)||'[]')}catch(e){return []}}
function setO(v){localStorage.setItem(OK,JSON.stringify(v))}
function getT(){try{return JSON.parse(localStorage.getItem(TK)||'[]')}catch(e){return []}}
function setT(v){localStorage.setItem(TK,JSON.stringify(v))}
function isHost(c){return (c.host||'')===currentName()}

function setSyncState(state,message){
 const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText');
 if(dot){dot.className='syncDot'+(state==='ok'?' ok':state==='bad'?' bad':'')}
 if(txt)txt.textContent=message;
}
function jsonpCloud(action,params={}){
 return new Promise((resolve,reject)=>{
   const cb='heremayCloudCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
   const script=document.createElement('script');
   const timer=setTimeout(()=>cleanup(new Error('雲端讀取逾時')),15000);
   function cleanup(error,data){
     clearTimeout(timer);
     try{delete window[cb]}catch(e){}
     script.remove();
     error?reject(error):resolve(data);
   }
   window[cb]=data=>cleanup(null,data);
   const q=new URLSearchParams({action,callback:cb,...params});
   script.src=SERVICE_URL+'?'+q.toString();
   script.onerror=()=>cleanup(new Error('無法連線雲端服務'));
   document.head.appendChild(script);
 });
}
function postCloud(action,payload){
 return new Promise((resolve,reject)=>{
   const frameName='heremayGroupbuyFrame_'+Date.now();
   const iframe=document.createElement('iframe');
   iframe.name=frameName;iframe.style.display='none';
   const form=document.createElement('form');
   form.method='POST';form.action=SERVICE_URL;form.target=frameName;form.style.display='none';
   [['action',action],['payload',JSON.stringify(payload||{})]].forEach(([name,value])=>{
     const input=document.createElement('input');input.type='hidden';input.name=name;input.value=value;form.appendChild(input);
   });
   document.body.append(iframe,form);
   form.submit();
   setTimeout(()=>{form.remove();iframe.remove();resolve(true)},1400);
 });
}
function normalizeCampaign(c){
 const status=c.status||(c.cancelled?'cancelled':c.closed?'closed':'open');
 return {...c,status,closed:status==='closed',cancelled:status==='cancelled'};
}
async function loadCloudData(showMessage=true){
 if(cloudBusy)return;
 cloudBusy=true;
 if(showMessage)setSyncState('busy','正在同步雲端資料…');
 try{
   const [campaignRes,orderRes,templateRes]=await Promise.all([
     jsonpCloud('listCampaigns'),
     jsonpCloud('listOrders'),
     jsonpCloud('listTemplates')
   ]);
   if(!campaignRes.ok)throw new Error(campaignRes.message||'活動讀取失敗');
   if(!orderRes.ok)throw new Error(orderRes.message||'訂單讀取失敗');
   if(!templateRes.ok)throw new Error(templateRes.message||'模板讀取失敗');
   setC((campaignRes.data||[]).map(normalizeCampaign));
   setO(orderRes.data||[]);
   setT(templateRes.data||[]);
   setSyncState('ok','雲端同步完成｜'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
   renderSavedTemplates();
   renderAll();
 }catch(error){
   console.error(error);
   setSyncState('bad','雲端連線失敗，暫時顯示本機快取');
   if(showMessage)toast('目前無法同步，已顯示最近資料');
   renderAll();
 }finally{
   cloudBusy=false;
 }
}
async function cloudWrite(action,payload,successMessage){
 setSyncState('busy','正在寫入雲端…');
 try{
   await postCloud(action,payload);
   await new Promise(r=>setTimeout(r,700));
   await loadCloudData(false);
   if(successMessage)toast(successMessage);
   return true;
 }catch(error){
   console.error(error);
   setSyncState('bad','雲端寫入失敗');
   toast('雲端寫入失敗，請稍後再試');
   return false;
 }
}

async function submitReply(cid){
 const c=getC().find(x=>x.id===cid);if(!c)return;
 let join='yes';
 if(c.replyRequired){
   join=document.querySelector(`input[name="join_${cid}"]:checked`)?.value||'';
   if(!join)return toast('請先選擇參加或不參加');
 }
 const companions=Number(document.getElementById('companions_'+cid)?.value||0);
 if(join==='no'){
   await cloudWrite('saveOrder',{
     id:'o_'+Date.now(),campaignId:cid,user:currentName(),status:'not_joining',
     companions:0,lines:[],note:'',createdAt:new Date().toISOString()
   },'已回覆不參加');
   return;
 }
 const lines=[];
 document.querySelectorAll(`[data-campaign="${cid}"]`).forEach(row=>{
   const qty=Number(row.querySelector('.qty').value||0);if(qty<=0)return;
   const p=c.products.find(x=>x.id===row.dataset.product);
   const si=Number(row.querySelector('.specChoice:checked')?.value);
   if(!Number.isInteger(si))return;
   const spec=p.specs[si],prefs={};
   row.querySelectorAll('.prefInput').forEach(el=>{if(el.value)prefs[el.dataset.pref]=el.value});
   row.querySelectorAll('.prefCheck:checked').forEach(el=>{
     prefs[el.dataset.pref]=prefs[el.dataset.pref]||[];
     prefs[el.dataset.pref].push(el.value);
   });
   lines.push({name:p.name,spec:spec.name,price:spec.price,qty,prefs,subtotal:spec.price*qty});
 });
 if(!lines.length&&c.template!=='travel'&&c.template!=='training')return toast('請至少選擇一個品項');
 await cloudWrite('saveOrder',{
   id:'o_'+Date.now(),campaignId:cid,user:currentName(),status:'accepted',
   companions,lines,note:document.getElementById('note_'+cid).value.trim(),
   createdAt:new Date().toISOString()
 },'回覆已送出並同步');
}

   return;
 }
 box.innerHTML=cs.length?`<div class="campaignList">${cs.map(c=>`<div class="campaignSummary"><h3>${esc(c.title)} ${c.cancelled?'<span class="badge no">已取消</span>':''}</h3><div class="meta">主辦人：${esc(c.host)}｜截止：${esc(c.deadline||'未設定')}</div>${c.capacity>0?`<div class="counter">已報名 ${participantCount(c)}／${c.capacity} 人｜剩餘 ${remaining(c)} 人</div>`:''}<div class="summaryActions"><button class="btn" onclick="openedCampaignId='${c.id}';renderAvailable()">進入${c.template==='travel'||c.template==='training'?'報名':'訂購'}</button>${isHost(c)?`<button class="btn secondary" onclick="editCampaign('${c.id}')">編輯活動</button><button class="btn secondary" onclick="duplicateCampaign('${c.id}')">複製新活動</button><button class="btn danger" onclick="finishCampaign('${c.id}')">活動結束</button><button class="btn danger" onclick="purgeCampaign('${c.id}')">永久刪除</button>`:''}</div></div>`).join('')}</div>`:'<div class="empty">目前沒有可參加的活動。</div>';
}
function renderMine(){const os=getO().filter(o=>o.user===currentName());document.getElementById('myOrders').innerHTML=os.length?os.map(o=>`<article class="eventCard"><h3>${esc(getC().find(c=>c.id===o.campaignId)?.title||'活動')}</h3><div class="meta">${new Date(o.createdAt).toLocaleString('zh-TW',{hour12:false})}</div><div class="meta">狀態：${o.status==='accepted'?'正取':o.status==='waitlist'?'候補':'不參加'}</div>${o.lines.map(l=>`<div class="meta">${esc(l.name)}｜${esc(l.spec)}｜${esc(Object.entries(l.prefs||{}).map(([k,v])=>k+'：'+(Array.isArray(v)?v.join('、'):v)).join('；'))}｜${l.qty}份｜$${l.subtotal}</div>`).join('')}</article>`).join(''):'<div class="empty">目前沒有回覆紀錄。</div>'}
function renderStats(){
 const cs=getC(),os=getO();
 document.getElementById('statsList').innerHTML=cs.length?cs.map(c=>{
   const list=os.filter(o=>o.campaignId===c.id);
   const money=list.reduce((s,o)=>s+o.lines.reduce((a,l)=>a+l.subtotal,0),0);
   const status=c.cancelled?'已取消':c.closed?'已結束':'進行中';
   const normalAction=c.closed
     ? `<button class="btn secondary" onclick="toggleClose('${c.id}')">重新開放</button>`
     : `<button class="btn danger" onclick="finishCampaign('${c.id}')">活動結束</button>`;
   return `<article class="eventCard">
     <h3>${esc(c.title)} <span class="badge ${c.closed||c.cancelled?'wait':'ok'}">${status}</span></h3>
     <div class="meta">正取 ${list.filter(o=>o.status==='accepted').length} 筆｜候補 ${list.filter(o=>o.status==='waitlist').length} 筆｜不參加 ${list.filter(o=>o.status==='not_joining').length} 筆</div>
     <div class="totalBox">總金額：$${money}</div>
     ${publicRows({...c,visibility:'full'})}
     ${isHost(c)?`<div class="actions">${normalAction}<button class="btn secondary" onclick="duplicateCampaign('${c.id}')">複製新活動</button><button class="btn danger" onclick="purgeCampaign('${c.id}')">永久刪除</button></div>`:''}
   </article>`;
 }).join(''):'<div class="empty">目前沒有活動。</div>';
}
async function deleteCampaign(id){
 const c=getC().find(x=>x.id===id);if(!c||!isHost(c))return;
 if(!confirm('確定永久刪除這個活動嗎？'))return;
 await cloudWrite('deleteCampaign',{id},'活動已永久刪除');
}
async function finishCampaign(id){
 const c=getC().find(x=>x.id===id);if(!c||!isHost(c))return;
 if(!confirm(`確定結束「${c.title}」嗎？\n結束後停止接受新回覆，但活動與訂單紀錄會保留。`))return;
 if(openedCampaignId===id)openedCampaignId='';
 await cloudWrite('finishCampaign',{id},'活動已結束，紀錄仍保留');
}
async function purgeCampaign(id){
 const c=getC().find(x=>x.id===id);if(!c||!isHost(c))return;
 const count=getO().filter(o=>o.campaignId===id).length;
 if(!confirm(`確定要永久刪除「${c.title}」嗎？\n活動與 ${count} 筆訂購／報名紀錄都會刪除。`))return;
 if(!confirm('再次確認：永久刪除後無法復原，但常用模板不受影響。'))return;
 if(openedCampaignId===id)openedCampaignId='';
 await cloudWrite('deleteCampaign',{id},'活動與全部訂單已永久刪除');
}
async function cancelCampaign(id){
 const c=getC().find(x=>x.id===id);if(!c||!isHost(c))return;
 const reason=prompt('請輸入取消原因，例如：雞腿缺貨');
 if(reason===null)return;
 await cloudWrite('cancelCampaign',{id,reason:reason.trim()},'活動已取消並保留原紀錄');
}
async function toggleClose(id){
 const c=getC().find(x=>x.id===id);if(!c||!isHost(c))return;
 await cloudWrite(c.closed?'reopenCampaign':'finishCampaign',{id},c.closed?'活動已重新開放':'活動已結束');
}
function renderAll(){renderAvailable();renderMine();renderStats()}

document.getElementById('hostName').value=currentName();
applyTemplate('drink',document.querySelector('.templateBtn'));
renderSavedTemplates();
renderAll();
loadCloudData(true);
</script>
</body>
</html>
