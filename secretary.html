<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#dceeff" />
  <title>和美智慧校園｜智慧秘書</title>
  <style>
    :root{
      --bg:#eef7ff;
      --card:#ffffff;
      --primary:#4f86c6;
      --primary-dark:#356ba9;
      --text:#23364d;
      --muted:#6d7d90;
      --line:#d9e7f3;
      --success:#2f9d69;
      --warning:#d89a33;
      --shadow:0 10px 28px rgba(49,91,133,.13);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#eaf5ff 0%,#f8fbff 100%);
      color:var(--text);
      min-height:100vh;
    }
    button{font:inherit}
    .app{
      width:min(900px,100%);
      margin:0 auto;
      padding:18px 14px 44px;
    }
    .topbar{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }
    .logo{
      width:72px;
      height:72px;
      border-radius:20px;
      object-fit:contain;
      flex:0 0 72px;
      display:block;
      background:#fff;
      padding:4px;
      box-shadow:0 5px 14px rgba(49,91,133,.16);
    }
    h1{font-size:1.55rem;margin:0;color:var(--primary-dark)}
    .subtitle{color:var(--muted);font-size:.95rem;margin-top:5px;line-height:1.55}
    .status-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:15px;
    }
    .pill{
      border-radius:999px;
      padding:7px 11px;
      background:#f4f8fc;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:.86rem;
      font-weight:700;
    }
    .intro{
      background:rgba(255,255,255,.88);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 18px;
      color:#536b7f;
      line-height:1.7;
      margin-bottom:16px;
      box-shadow:0 7px 20px rgba(49,91,133,.08);
    }
    .menu{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    .menu-card{
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--card);
      box-shadow:var(--shadow);
      padding:22px 18px;
      text-align:left;
      cursor:pointer;
      min-height:190px;
      transition:.18s ease;
      color:inherit;
    }
    .menu-card:hover{
      transform:translateY(-3px);
      box-shadow:0 15px 32px rgba(49,91,133,.18);
    }
    .menu-card:active{transform:scale(.985)}
    .icon{font-size:42px;margin-bottom:12px}
    .menu-card h2{
      margin:0;
      font-size:1.25rem;
      color:var(--primary-dark);
    }
    .menu-card p{
      margin:9px 0 0;
      color:var(--muted);
      line-height:1.6;
      font-size:.94rem;
    }
    .arrow{
      display:block;
      margin-top:18px;
      color:var(--primary);
      font-size:1.65rem;
      font-weight:900;
    }
    .toolbar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .toolbtn{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--primary-dark);
      padding:11px 15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(49,91,133,.09);
    }
    .toolbtn.primary{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }
    .version{
      text-align:center;
      color:var(--muted);
      font-size:.8rem;
      margin-top:20px;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      min-width:230px;
      max-width:88vw;
      background:#23364d;
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:99;
      text-align:center;
    }
    .toast.show{opacity:1}
    @media(max-width:760px){
      .menu{grid-template-columns:1fr}
      .menu-card{min-height:145px}
    }
    @media(max-width:520px){
      .app{padding:12px 10px 36px}
      .brand{align-items:flex-start}
      .logo{width:62px;height:62px;flex-basis:62px}
      h1{font-size:1.3rem}
      .subtitle{font-size:.88rem}
      .menu-card{padding:18px 16px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="brand">
        <img class="logo" src="assets/logo.png?v=20260722" alt="和美智慧校園 LOGO"
             onerror="this.src='assets/app-icon.png?v=20260722'">
        <div>
          <h1>和美智慧校園｜智慧秘書</h1>
          <div class="subtitle">筆記、行程提醒與專案管理的入口中心</div>
        </div>
      </div>
      <div class="status-row">
        <span class="pill" id="todayText">今日</span>
        <span class="pill">智慧秘書中心</span>
        <span class="pill">版本 v2.0.0</span>
      </div>
    </section>

    <section class="intro">
      請選擇要進入的功能。筆記本、行事曆與專案計畫各自獨立運作，避免不同功能混在同一個頁面中。
    </section>

    <section class="menu">
      <button class="menu-card" type="button" onclick="location.href='notes.html'">
        <div class="icon">📒</div>
        <h2>筆記本</h2>
        <p>記錄私人記事、附件、備忘與分類整理。私人記事以本機保存為主。</p>
        <span class="arrow">›</span>
      </button>

      <button class="menu-card" type="button" onclick="location.href='calendar.html'">
        <div class="icon">🗓️</div>
        <h2>行事曆</h2>
        <p>建立行程、設定多組提前提醒、週期事項、通知與 Google 日曆同步。</p>
        <span class="arrow">›</span>
      </button>

      <button class="menu-card" type="button" onclick="location.href='project_center.html'">
        <div class="icon">📁</div>
        <h2>專案計畫</h2>
        <p>管理大型活動、工作項目、里程碑、分工、會議紀錄、附件與進度。</p>
        <span class="arrow">›</span>
      </button>
    </section>

    <div class="toolbar">
      <button class="toolbtn primary" type="button" onclick="location.href='admin.html'">返回主管首頁</button>
      <button class="toolbtn" type="button" onclick="checkVersion()">檢查新版</button>
      <button class="toolbtn" type="button" onclick="refreshPage()">重新同步</button>
    </div>

    <div class="version">智慧秘書中心 v2.0.0｜2026-07-22｜三大功能獨立化</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    document.getElementById('todayText').textContent =
      new Date().toLocaleDateString('zh-TW',{
        year:'numeric',month:'long',day:'numeric',weekday:'short'
      });

    function showToast(message){
      const el=document.getElementById('toast');
      el.textContent=message;
      el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'),2200);
    }

    function checkVersion(){
      showToast('目前為智慧秘書中心 v2.0.0');
    }

    function refreshPage(){
      showToast('正在重新整理最新資料');
      setTimeout(()=>location.reload(),500);
    }
  </script>
</body>
</html>
