      --bg1:#fff6fb;

  <script>
    const APP_VERSION = '1.3.4';

    /*
      正式登入架構說明
      1. 帳號密碼、Passkey 註冊與驗證，皆交由後端伺服器判斷。
      2. 瀏覽器只保存「上次使用帳號」，不保存角色、密碼或通行權限。
      3. 新 NAS 到位後，只要把 API_BASE 與 WIFI_ENDPOINT 改成正式網址即可。
    */
    const CONFIG = {
      API_BASE: 'https://script.google.com/macros/s/AKfycbzbZ6r6c8XjHuKad0U5TIJXr8i141fCBwNJcVsKnoGa1-NXG_JOzapeRF5cVlnGI4F7/exec',
      WIFI_ENDPOINT: '', // 新 NAS 完成後再填入園內網路驗證網址
      WIFI_TIMEOUT_MS: 5000,
      TEMP_DEMO_MODE: false
    };

    let waitingWorker = null;
    let refreshing = false;
    let campusWifiVerified = false;

    const routes = {
      admin: 'admin.html',
      teacher: 'teacher.html',
      support: 'support.html'
    };

    // 僅供尚未完成後端前測試畫面分流；正式上線後由伺服器回傳角色。
    const demoAccountRoleMap = {
      'jack':'admin','jack159966':'admin','謝子元':'admin','子元':'admin',
      '園長':'admin','吳玉瑩':'admin','玉瑩':'admin',
      '主任':'admin','謝秉儒':'admin','秉儒':'admin',
      'admin':'admin','001':'admin',
      'teacher':'teacher','teacher01':'teacher','老師':'teacher',
      '教保':'teacher','教保人員':'teacher','002':'teacher',
      'support':'support','support01':'support','庶務':'support',
      '庶務人員':'support','廚工':'support','清潔':'support',
      '清潔人員':'support','003':'support'
    };

    function setUpdateStatus(message, state='normal'){
      const card = document.getElementById('updateCard');
      const status = document.getElementById('updateStatus');
      const icon = document.getElementById('updateIcon');
      const btn = document.getElementById('updateBtn');
      if(!card || !status || !icon || !btn) return;
      card.classList.toggle('available', state === 'available');
      card.classList.toggle('error', state === 'error');
      btn.classList.toggle('show', state === 'available');
      status.textContent = message;
      icon.textContent = state === 'available' ? '⬆️' :
                         state === 'error' ? '⚠️' :
                         state === 'done' ? '✅' : '🔄';
    }

    async function registerUpdateSystem(){
      document.getElementById('versionText').textContent =
        `Heremay Smart Campus v${APP_VERSION}`;

      await checkVersionFile();

      if(!('serviceWorker' in navigator)) return;

      try{
        const registration = await navigator.serviceWorker.register(
          './sw.js',
          { scope:'./', updateViaCache:'none' }
        );

        registration.addEventListener('updatefound', () => {
          const worker = registration.installing;
          if(!worker) return;
          setUpdateStatus('正在下載新版程式……');

          worker.addEventListener('statechange', () => {
            if(worker.state === 'installed' && navigator.serviceWorker.controller){
              waitingWorker = registration.waiting || worker;
              setUpdateStatus('發現新版本，按「立即更新」即可載入。', 'available');
            }
          });
        });

        if(registration.waiting){
          waitingWorker = registration.waiting;
          setUpdateStatus('發現新版本，按「立即更新」即可載入。', 'available');
        }

        try{
          await registration.update();
        }catch(err){
          console.warn('Service Worker 暫時無法更新：', err);
        }

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if(refreshing) return;
          refreshing = true;
          location.reload();
        });
      }catch(err){
        console.warn('Service Worker 註冊失敗：', err);
      }
    }

    async function checkVersionFile(){
      try{
        const response = await fetch(`./version.json?_=${Date.now()}`, { cache:'no-store' });
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const info = await response.json();

        if(info.version && info.version !== APP_VERSION){
          setUpdateStatus(`雲端已有 v${info.version}，正在準備更新……`);
          const registration = await navigator.serviceWorker.getRegistration();
          await registration?.update();
          setTimeout(() => {
            if(!waitingWorker){
              setUpdateStatus('新版已發布，請稍後重新檢查或重新開啟。', 'available');
            }
          }, 1200);
        }else{
          setUpdateStatus(`目前版本 v${APP_VERSION}｜已是最新版本`, 'done');
        }
      }catch(err){
        setUpdateStatus(`目前版本 v${APP_VERSION}｜暫時無法連線檢查`, 'error');
      }
    }

    async function applyUpdate(){
      setUpdateStatus('正在更新，完成後會自動重新開啟……');

      if(waitingWorker){
        waitingWorker.postMessage({ type:'SKIP_WAITING' });
        return;
      }

      const registration = await navigator.serviceWorker.getRegistration();
      await registration?.update();

      if(registration?.waiting){
        waitingWorker = registration.waiting;
        waitingWorker.postMessage({ type:'SKIP_WAITING' });
      }else{
        location.reload();
      }
    }

    function setWifiStatus(message, state='normal'){
      const card = document.getElementById('wifiCard');
      const status = document.getElementById('wifiStatus');
      const icon = document.getElementById('wifiIcon');
      if(!card || !status || !icon) return;

      card.classList.toggle('available', state === 'ok');
      card.classList.toggle('error', state === 'error');
      status.textContent = message;
      icon.textContent = state === 'ok' ? '✅' :
                         state === 'error' ? '⚠️' : '📶';
    }

    async function fetchWithTimeout(url, options={}, timeoutMs=5000){
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      try{
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      }finally{
        clearTimeout(timer);
      }
    }

    async function checkCampusWifi(showResult=false){
      campusWifiVerified = false;

      if(!CONFIG.WIFI_ENDPOINT){
        setWifiStatus('園內網路驗證尚未啟用｜目前可正常登入');
        campusWifiVerified = true;
        if(showResult) showToast('園內網路驗證尚未啟用，目前不影響登入。');
        return true;
      }

      setWifiStatus('正在確認是否位於園內網路……');

      try{
        const response = await fetchWithTimeout(
          `${CONFIG.WIFI_ENDPOINT}?_=${Date.now()}`,
          {
            cache:'no-store',
            credentials:'include'
          },
          CONFIG.WIFI_TIMEOUT_MS
        );

        if(!response.ok) throw new Error(`HTTP ${response.status}`);

        const result = await response.json();
        if(result && result.ok === true){
          campusWifiVerified = true;
          setWifiStatus('園內網路驗證成功', 'ok');
          if(showResult) showToast('園內網路驗證成功。');
          return true;
        }
      }catch(err){
        console.warn('園內網路驗證失敗：', err);
      }

      setWifiStatus('無法驗證園內網路，請確認已連接 HEREMAY Wi-Fi', 'error');
      if(showResult){
        showToast('無法驗證園內網路，請確認裝置已連接園內 Wi-Fi。');
      }
      return false;
    }

    async function requireCampusWifi(){
      if(campusWifiVerified) return true;
      return await checkCampusWifi(false);
    }

    function bytesToBase64url(bytes){
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary)
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/,'');
    }

    function base64urlToBytes(value){
      const padding = '='.repeat((4 - value.length % 4) % 4);
      const base64 = (value + padding)
        .replace(/-/g, '+')
        .replace(/_/g, '/');
      const binary = atob(base64);
      return Uint8Array.from(binary, c => c.charCodeAt(0));
    }

    function normalizePublicKeyOptions(options){
      const copy = structuredClone(options);

      if(copy.challenge){
        copy.challenge = base64urlToBytes(copy.challenge);
      }

      if(copy.user?.id){
        copy.user.id = base64urlToBytes(copy.user.id);
      }

      if(Array.isArray(copy.allowCredentials)){
        copy.allowCredentials = copy.allowCredentials.map(item => ({
          ...item,
          id: base64urlToBytes(item.id)
        }));
      }

      if(Array.isArray(copy.excludeCredentials)){
        copy.excludeCredentials = copy.excludeCredentials.map(item => ({
          ...item,
          id: base64urlToBytes(item.id)
        }));
      }

      return copy;
    }

    function credentialToJSON(credential){
      const response = credential.response;

      const json = {
        id: credential.id,
        rawId: bytesToBase64url(new Uint8Array(credential.rawId)),
        type: credential.type,
        clientExtensionResults: credential.getClientExtensionResults()
      };

      if(response.clientDataJSON){
        json.response = {
          clientDataJSON: bytesToBase64url(new Uint8Array(response.clientDataJSON))
        };
      }

      if(response.attestationObject){
        json.response.attestationObject =
          bytesToBase64url(new Uint8Array(response.attestationObject));
      }

      if(response.authenticatorData){
        json.response.authenticatorData =
          bytesToBase64url(new Uint8Array(response.authenticatorData));
      }

      if(response.signature){
        json.response.signature =
          bytesToBase64url(new Uint8Array(response.signature));
      }

      if(response.userHandle){
        json.response.userHandle =
          bytesToBase64url(new Uint8Array(response.userHandle));
      }

      return json;
    }

    async function apiPost(path, body){
  if(!CONFIG.API_BASE){
    throw new Error('登入伺服器尚未設定');
  }

  const formData = new URLSearchParams();

  Object.entries(body || {}).forEach(([key, value]) => {
    formData.set(key, String(value ?? ''));
  });

  const response = await fetchWithTimeout(
    CONFIG.API_BASE,
    {
      method: 'POST',
      body: formData
    },
    15000
  );

  let data = {};

  try{
    data = await response.json();
  }catch(_){
    throw new Error('登入服務回傳格式不正確');
  }

  if(!response.ok){
    throw new Error(data.message || `伺服器錯誤 HTTP ${response.status}`);
  }

  return data;
}


    function iframeLogin(account, password){
      return new Promise((resolve, reject) => {
        if(!CONFIG.API_BASE){
          reject(new Error('登入伺服器尚未設定'));
          return;
        }

        const frameName = `heremayLoginFrame_${Date.now()}`;
        const iframe = document.createElement('iframe');
        const form = document.createElement('form');
        const accountInput = document.createElement('input');
        const passwordInput = document.createElement('input');

        iframe.name = frameName;
        iframe.style.display = 'none';
        iframe.setAttribute('aria-hidden', 'true');

        form.method = 'POST';
        form.action = CONFIG.API_BASE;
        form.target = frameName;
        form.style.display = 'none';

        accountInput.type = 'hidden';
        accountInput.name = 'account';
        accountInput.value = account;

        passwordInput.type = 'hidden';
        passwordInput.name = 'password';
        passwordInput.value = password;

        form.append(accountInput, passwordInput);
        document.body.append(iframe, form);

        let finished = false;

        const cleanup = () => {
          window.removeEventListener('message', receiveResult);
          clearTimeout(timer);
          form.remove();
          setTimeout(() => iframe.remove(), 100);
        };

        const receiveResult = event => {
          const message = event.data;

          if(!message || message.type !== 'HEREMAY_LOGIN_RESULT') return;
          if(finished) return;

          finished = true;
          cleanup();
          resolve(message.payload || {
            ok: false,
            message: '登入服務未回傳結果'
          });
        };

        const timer = setTimeout(() => {
          if(finished) return;
          finished = true;
          cleanup();
          reject(new Error('登入服務連線逾時，請稍後再試'));
        }, 15000);

        window.addEventListener('message', receiveResult);
        form.submit();
      });
    }

    async function registerFaceLogin(){
      const account = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;

      if(!account || !password){
        showToast('首次設定請先輸入帳號與密碼。');
        return;
      }

      if(!window.PublicKeyCredential || !navigator.credentials){
        showToast('這個瀏覽器不支援 Face ID／指紋登入。');
        return;
      }

      const wifiOk = await requireCampusWifi();
      if(!wifiOk){
        showToast('請先連接園內網路，再設定刷臉登入。');
        return;
      }

      if(CONFIG.TEMP_DEMO_MODE && !CONFIG.API_BASE){
        localStorage.setItem('heremay.lastFaceAccount', account);
        showToast('入口頁已準備完成；新 NAS 登入伺服器完成後即可正式綁定 Face ID。');
        return;
      }

      showToast('刷臉登入將在新 NAS 完成後啟用；目前請先使用帳號密碼登入。');
      return;

      try{
        const optionsData = await apiPost('/auth/passkey/register/options', {
          account,
          password
        });

        const credential = await navigator.credentials.create({
          publicKey: normalizePublicKeyOptions(optionsData.publicKey)
        });

        const result = await apiPost('/auth/passkey/register/verify', {
          account,
          credential: credentialToJSON(credential)
        });

        if(!result.ok) throw new Error(result.message || '註冊驗證失敗');

        localStorage.setItem('heremay.lastFaceAccount', account);
        document.getElementById('password').value = '';
        showToast('Face ID／生物辨識登入設定完成。');
      }catch(err){
        console.error(err);
        if(err.name === 'NotAllowedError'){
          showToast('已取消設定，或裝置未完成生物辨識。');
        }else{
          showToast(`設定失敗：${err.message || err.name}`);
        }
      }
    }

    async function faceLogin(){
      const typedAccount = document.getElementById('account').value.trim();
      const account = typedAccount ||
        localStorage.getItem('heremay.lastFaceAccount') || '';

      if(!account){
        showToast('首次使用請先輸入帳號，再設定刷臉登入。');
        return;
      }

      if(!window.PublicKeyCredential || !navigator.credentials){
        showToast('這個瀏覽器不支援 Face ID／指紋登入。');
        return;
      }

      const wifiOk = await requireCampusWifi();
      if(!wifiOk){
        showToast('請先連接園內網路，才能登入。');
        return;
      }

      if(CONFIG.TEMP_DEMO_MODE && !CONFIG.API_BASE){
        const role = demoAccountRoleMap[account];
        if(role){
          localStorage.setItem('heremay.lastFaceAccount', account);
          goRole(role);
        }else{
          showToast('目前為測試模式，請使用 jack、teacher 或 support。');
        }
        return;
      }

      showToast('刷臉登入將在新 NAS 完成後啟用；目前請先使用帳號密碼登入。');
      return;

      try{
        const optionsData = await apiPost('/auth/passkey/login/options', {
          account
        });

        const assertion = await navigator.credentials.get({
          publicKey: normalizePublicKeyOptions(optionsData.publicKey)
        });

        const result = await apiPost('/auth/passkey/login/verify', {
          account,
          credential: credentialToJSON(assertion)
        });

        if(!result.ok || !result.role){
          throw new Error(result.message || '登入驗證失敗');
        }

        localStorage.setItem('heremay.lastFaceAccount', account);
        goRole(result.role);
      }catch(err){
        console.error(err);
        if(err.name === 'NotAllowedError'){
          showToast('生物辨識已取消或驗證未通過。');
        }else{
          showToast(`刷臉登入失敗：${err.message || err.name}`);
        }
      }
    }

    function digitsOnly(input){
      input.value = input.value.replace(/\D/g, '').slice(0, 6);
    }

    function togglePassword(){
      const p = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      const showing = p.type === 'text';

      p.type = showing ? 'password' : 'text';
      btn.textContent = showing ? '👁️' : '🙈';
      btn.setAttribute('aria-label', showing ? '顯示密碼' : '隱藏密碼');
      btn.title = showing ? '顯示密碼' : '隱藏密碼';
      p.focus();
      p.setSelectionRange(p.value.length, p.value.length);
    }

    async function demoLogin(){
      const account = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.querySelector('.login-btn');

      if(!account || !password){
        showToast('請輸入帳號與 6 位數字密碼。');
        return;
      }

      if(!/^\d{6}$/.test(password)){
        showToast('密碼請輸入 6 位數字。');
        return;
      }

      const wifiOk = await requireCampusWifi();
      if(!wifiOk){
        showToast('請先連接園內網路，才能登入。');
        return;
      }

      if(CONFIG.TEMP_DEMO_MODE && !CONFIG.API_BASE){
        const role = demoAccountRoleMap[account];
        if(role){
          localStorage.setItem('heremay.lastFaceAccount', account);
          goRole(role);
        }else{
          showToast('目前為測試模式，請使用 jack、teacher 或 support。');
        }
        return;
      }

      try{
        if(loginBtn){
          loginBtn.disabled = true;
          loginBtn.textContent = '驗證中……';
        }

        const result = await iframeLogin(account, password);

        if(!result.ok || !result.role){
          throw new Error(result.message || '帳號或密碼錯誤');
        }

        localStorage.setItem('heremay.lastFaceAccount', account);

        if(result.employee){
          localStorage.setItem(
            'heremay.currentEmployee',
            JSON.stringify(result.employee)
          );
        }else{
          localStorage.removeItem('heremay.currentEmployee');
        }

        document.getElementById('password').value = '';
        goRole(result.role);
      }catch(err){
        console.error(err);
        showToast(`登入失敗：${err.message || err.name}`);
      }finally{
        if(loginBtn){
          loginBtn.disabled = false;
          loginBtn.textContent = '登入 →';
        }
      }
    }

    function hideFaceModal(){
      document.getElementById('faceModal').classList.remove('show');
    }

    function closeFaceModal(event){
      if(event.target.id === 'faceModal') hideFaceModal();
    }

    function goRole(role){
      const target = routes[role];
      if(!target){
        showToast('登入成功，但尚未設定此身分的首頁。');
        return;
      }
      window.location.href = target;
    }

    function showToast(message){
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3200);
    }

    window.addEventListener('load', () => {
      registerUpdateSystem();
      checkCampusWifi(false);

      const lastAccount = localStorage.getItem('heremay.lastFaceAccount');
      if(lastAccount){
        document.getElementById('account').value = lastAccount;
      }
    });
  </script>
