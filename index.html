<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f4d3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Heremay" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Heremay Smart Campus v0.1</title>
  <style>
    :root{--green:#1f4d3a;--green2:#2e6b50;--cream:#f7f2e8;--gold:#c9a646;--ink:#1d2a24;--muted:#6f7d73;--card:#fffaf1;--danger:#a33a2c;--ok:#247a4b;--line:rgba(31,77,58,.16);--shadow:0 14px 40px rgba(31,77,58,.14);}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(180deg,#f7f2e8 0%,#efe5d2 100%);color:var(--ink);min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
    .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}.top{padding:22px 18px 12px}.brand{display:flex;justify-content:space-between;align-items:center}.logo{width:44px;height:44px;border-radius:14px;background:var(--green);display:grid;place-items:center;color:var(--gold);font-weight:800;box-shadow:var(--shadow)}h1{font-size:22px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:3px}.badge{font-size:12px;background:rgba(201,166,70,.18);color:#745f23;padding:7px 10px;border-radius:999px}.content{flex:1;padding:0 16px 90px}.page{display:none;animation:fade .18s ease}.page.active{display:block}@keyframes fade{from{opacity:.2;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .card{background:rgba(255,250,241,.94);border:1px solid var(--line);border-radius:24px;padding:18px;margin:12px 0;box-shadow:var(--shadow)}.hero{background:linear-gradient(135deg,var(--green),#16382b);color:white}.hero .muted{color:rgba(255,255,255,.78)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fffdf8}.stat b{font-size:26px}.muted{color:var(--muted);font-size:13px}.progress{height:12px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-top:14px}.progress span{display:block;height:100%;background:var(--gold);width:0%}.btn{width:100%;border:0;border-radius:18px;background:var(--green);color:white;padding:15px 16px;font-size:16px;font-weight:700;margin:8px 0;cursor:pointer}.btn.secondary{background:#fffdf8;color:var(--green);border:1px solid var(--line)}.btn.gold{background:var(--gold);color:#2c2410}.btn.danger{background:var(--danger)}
    .tabs{position:fixed;left:0;right:0;bottom:0;padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:rgba(247,242,232,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:flex;gap:8px;justify-content:center}.tabs button{max-width:140px;flex:1;border:0;border-radius:16px;padding:10px 4px;background:transparent;color:var(--muted);font-size:12px}.tabs button.active{background:var(--green);color:white;font-weight:700}.class-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.class-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fffdf8;text-align:center}.class-card.done{background:rgba(36,122,75,.12);border-color:rgba(36,122,75,.35)}.class-card.warn{background:rgba(201,166,70,.14)}.class-card b{font-size:20px;display:block;margin-bottom:4px}.pill{display:inline-block;padding:5px 8px;border-radius:99px;font-size:12px;background:rgba(31,77,58,.1);color:var(--green)}
    label{display:block;font-weight:700;margin:12px 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:#fffdf8;padding:13px;font-size:16px;color:var(--ink)}textarea{min-height:84px;resize:vertical}.record{border-left:5px solid var(--green);padding:10px 12px;margin:10px 0;background:#fffdf8;border-radius:14px}.record.follow{border-left-color:var(--gold)}.empty{text-align:center;color:var(--muted);padding:24px}.smallrow{display:flex;gap:8px}.smallrow>*{flex:1}.version{text-align:center;color:var(--muted);font-size:12px;margin:18px 0}.holiday{display:flex;gap:8px;margin:8px 0}.holiday span{flex:1;background:#fffdf8;border:1px solid var(--line);border-radius:14px;padding:10px}.holiday button{width:58px;border:0;border-radius:14px;background:var(--danger);color:white}
  </style>
</head>
<body>
<div class="app">
  <header class="top"><div class="brand"><div style="display:flex;gap:12px;align-items:center"><div class="logo">H</div><div><h1>Heremay</h1><div class="sub">Smart Campus｜智慧巡堂</div></div></div><div class="badge" id="installState">PWA</div></div></header>
  <main class="content">
    <section id="home" class="page active">
      <div class="card hero"><div class="muted" id="todayText"></div><h2 style="margin:8px 0 0">今日巡堂概況</h2><div class="progress"><span id="progressBar"></span></div><p id="progressText" class="muted"></p></div>
      <div class="grid"><div class="stat"><div class="muted">上午</div><b id="amCount">0/0</b></div><div class="stat"><div class="muted">下午</div><b id="pmCount">0/0</b></div><div class="stat"><div class="muted">需追蹤</div><b id="followCount">0</b></div><div class="stat"><div class="muted">補登</div><b id="makeupCount">0</b></div></div>
      <div class="card"><h3>今日提醒</h3><div id="todayAlerts"></div><button class="btn" onclick="showPage('patrol')">開始巡堂</button><button class="btn secondary" onclick="showPage('records')">查看歷史紀錄</button></div>
    </section>
    <section id="patrol" class="page"><div class="card"><h2>今日巡堂</h2><div class="smallrow"><select id="periodFilter" onchange="renderPatrol()"><option value="上午">上午</option><option value="下午">下午</option></select><button class="btn secondary" onclick="toggleHolidayToday()">今日假日</button></div></div><div class="class-list" id="classList"></div></section>
    <section id="form" class="page"><div class="card"><h2>巡堂填寫</h2><label>班級</label><select id="formClass"></select><label>巡堂時段</label><select id="formPeriod"><option>上午</option><option>下午</option></select><label>狀況</label><select id="formStatus"><option value="正常">正常</option><option value="需追蹤">需追蹤</option></select><label>備註</label><textarea id="formNote" placeholder="例如：環境良好、餐前秩序需提醒、設備需維修……"></textarea><label><input id="formMakeup" type="checkbox" style="width:auto;margin-right:8px">補登紀錄</label><button class="btn" onclick="saveRecord()">儲存巡堂紀錄</button><button class="btn secondary" onclick="showPage('patrol')">返回今日巡堂</button></div></section>
    <section id="records" class="page"><div class="card"><h2>歷史紀錄</h2><input id="recordDate" type="date" onchange="renderRecords()"><button class="btn secondary" onclick="exportCSV()">匯出 CSV</button></div><div id="recordList"></div></section>
    <section id="settings" class="page"><div class="card"><h2>設定</h2><label>班級設定（用逗號分隔）</label><textarea id="classSetting"></textarea><div class="smallrow"><div><label>上午提醒</label><input id="amReminder" type="time"></div><div><label>下午提醒</label><input id="pmReminder" type="time"></div></div><button class="btn" onclick="saveSettings()">儲存設定</button><button class="btn gold" onclick="testBell()">測試鈴聲</button></div><div class="card"><h3>國定假日 / 不巡堂日</h3><div class="smallrow"><input id="holidayInput" type="date"><button class="btn secondary" onclick="addHoliday()">新增</button></div><div id="holidayList"></div></div><div class="version">Heremay Smart Campus PWA v1.0</div></section>
  </main>
  <nav class="tabs"><button class="active" onclick="showPage('home')">首頁</button><button onclick="showPage('patrol')">巡堂</button><button onclick="showPage('records')">紀錄</button><button onclick="showPage('settings')">設定</button></nav>
</div>
<script>
const KEY='heremay_patrol_pwa_v1';
const defaults={classes:['A1','A2','A3','B1','B2','B3','C1','C2','C3','Y1','Y2','Y3'],records:[],holidays:[],amReminder:'09:30',pmReminder:'15:00'};
let data=load();
function load(){try{return {...defaults,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch(e){return {...defaults}}}
function persist(){localStorage.setItem(KEY,JSON.stringify(data));}
function ymd(d=new Date()){return d.toISOString().slice(0,10)}
function zhDate(){return new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'long'});}
function todayRecords(){return data.records.filter(r=>r.date===ymd())}
function isHoliday(date=ymd()){return data.holidays.includes(date)}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tabs button')].find(b=>b.textContent.includes({home:'首頁',patrol:'巡堂',records:'紀錄',settings:'設定'}[id]))?.classList.add('active'); if(id==='home')renderHome(); if(id==='patrol')renderPatrol(); if(id==='records')renderRecords(); if(id==='settings')renderSettings();}
function renderHome(){document.getElementById('todayText').textContent=zhDate();const rec=todayRecords();const total=data.classes.length*2;const am=rec.filter(r=>r.period==='上午').length;const pm=rec.filter(r=>r.period==='下午').length;const pct=total?Math.round(rec.length/total*100):0;document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent=isHoliday()?'今天已註記為不巡堂日':`完成率 ${pct}%（${rec.length}/${total}）`;document.getElementById('amCount').textContent=`${am}/${data.classes.length}`;document.getElementById('pmCount').textContent=`${pm}/${data.classes.length}`;document.getElementById('followCount').textContent=rec.filter(r=>r.status==='需追蹤').length;document.getElementById('makeupCount').textContent=rec.filter(r=>r.makeup).length;const missing=[];['上午','下午'].forEach(p=>data.classes.forEach(c=>{if(!rec.some(r=>r.className===c&&r.period===p))missing.push(`${p} ${c} 尚未巡堂`)}));document.getElementById('todayAlerts').innerHTML=isHoliday()?'<p class="empty">今日為不巡堂日</p>':(missing.slice(0,8).map(m=>`<p>□ ${m}</p>`).join('')||'<p class="empty">今日巡堂已完成</p>');}
function renderPatrol(){const period=document.getElementById('periodFilter').value;const rec=todayRecords();document.getElementById('classList').innerHTML=data.classes.map(c=>{const r=rec.find(x=>x.className===c&&x.period===period);return `<div class="class-card ${r?'done':''}" onclick="openForm('${c}','${period}')"><b>${c}</b><span class="pill">${r?'已完成':'未完成'}</span></div>`}).join('');}
function openForm(c,p){showPage('form');fillClassOptions();document.getElementById('formClass').value=c;document.getElementById('formPeriod').value=p;document.getElementById('formStatus').value='正常';document.getElementById('formNote').value='';document.getElementById('formMakeup').checked=false;}
function fillClassOptions(){document.getElementById('formClass').innerHTML=data.classes.map(c=>`<option>${c}</option>`).join('')}
function saveRecord(){const r={id:Date.now(),date:ymd(),createdAt:new Date().toLocaleString('zh-TW'),className:formClass.value,period:formPeriod.value,status:formStatus.value,note:formNote.value.trim(),makeup:formMakeup.checked};data.records=data.records.filter(x=>!(x.date===r.date&&x.className===r.className&&x.period===r.period));data.records.push(r);persist();testBell(120);showPage('patrol');}
function renderRecords(){if(!recordDate.value)recordDate.value=ymd();const list=data.records.filter(r=>r.date===recordDate.value).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));recordList.innerHTML=list.map(r=>`<div class="record ${r.status==='需追蹤'?'follow':''}"><b>${r.period}｜${r.className}｜${r.status}</b><div class="muted">${r.createdAt}${r.makeup?'｜補登':''}</div><div>${r.note||'無備註'}</div></div>`).join('')||'<div class="card empty">這一天尚無巡堂紀錄</div>';}
function renderSettings(){classSetting.value=data.classes.join('、');amReminder.value=data.amReminder;pmReminder.value=data.pmReminder;holidayInput.value=ymd();holidayList.innerHTML=data.holidays.sort().map(h=>`<div class="holiday"><span>${h}</span><button onclick="removeHoliday('${h}')">刪除</button></div>`).join('')||'<p class="empty">尚未設定假日</p>';}
function saveSettings(){data.classes=classSetting.value.split(/[、,，\n\s]+/).map(x=>x.trim()).filter(Boolean);data.amReminder=amReminder.value||'09:30';data.pmReminder=pmReminder.value||'15:00';persist();alert('設定已儲存');renderHome();}
function addHoliday(){if(holidayInput.value&&!data.holidays.includes(holidayInput.value)){data.holidays.push(holidayInput.value);persist();renderSettings();}}
function removeHoliday(h){data.holidays=data.holidays.filter(x=>x!==h);persist();renderSettings();}
function toggleHolidayToday(){if(isHoliday())removeHoliday(ymd());else{data.holidays.push(ymd());persist();}renderPatrol();renderHome();alert(isHoliday()?'今日已設為不巡堂日':'今日已取消不巡堂日');}
function testBell(ms=420){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=.08;o.start();setTimeout(()=>{o.stop();ctx.close()},ms);}catch(e){}}
function exportCSV(){const rows=[['日期','建立時間','班級','時段','狀況','是否補登','備註'],...data.records.map(r=>[r.date,r.createdAt,r.className,r.period,r.status,r.makeup?'是':'否',r.note])];const csv='\ufeff'+rows.map(row=>row.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='Heremay巡堂紀錄.csv';a.click();}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
fillClassOptions();renderHome();
</script>
</body>
</html>
