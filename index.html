<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>和美智慧校園｜Heremay Smart Campus</title>

  <!-- 手機桌面圖示與 PWA 設定 -->
  <meta name="theme-color" content="#fff6fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="和美智慧校園" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/app-icon.png?v=20260716" />
  <link rel="icon" type="image/png" href="assets/app-icon.png?v=20260716" />
  <link rel="manifest" href="manifest.webmanifest?v=20260716" />

  <style>
    :root{
      --bg1:#fff6fb;
      --bg2:#eaf7ff;
      --card:#ffffff;
      --pink:#ef6f9f;
      --pink2:#ff9fc0;
      --blue:#55aee0;
      --green:#38aa6c;
      --ink:#34424a;
      --muted:#78909b;
      --line:#f3c8d8;
      --shadow:0 18px 45px rgba(117,91,124,.18);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,210,229,.9), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(189,232,255,.9), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .app-shell{
      width:min(100%,460px);
      min-height:100vh;
      margin:0 auto;
      padding:28px 18px 22px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:18px;
    }
    .logo-area{text-align:center}
    .logo-wrap{
      width:128px;height:128px;margin:0 auto 12px;
      border-radius:36px;
      background:linear-gradient(145deg,#fff,#ffe7f0 48%,#d8f2ff);
      display:grid;place-items:center;
      box-shadow:var(--shadow);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.9);
    }
    .logo-img{width:100%;height:100%;object-fit:contain;padding:8px}
    .castle-fallback{display:none;font-size:66px}
    .logo-wrap.no-img .logo-img{display:none}
    .logo-wrap.no-img .castle-fallback{display:block}
    .school-name{margin:0;font-size:24px;color:#5a4050;font-weight:900;letter-spacing:.4px}
    .school-sub{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:800}
    .login-card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.95);
      border-radius:var(--radius);
      padding:22px 18px;
      box-shadow:var(--shadow);
    }
    h1{margin:0 0 18px;text-align:center;color:#6d4056;font-size:22px;line-height:1.3}
    .input-box{
      display:flex;align-items:center;gap:10px;
      border:1px solid #f0c8d8;
      background:#fffafd;
      border-radius:18px;
      padding:0 12px;
      min-height:54px;
      margin-top:12px;
    }
    .icon{font-size:20px;flex:0 0 auto}
    input{
      border:0;outline:0;background:transparent;
      width:100%;font-size:16px;color:#4a3941;
      font-family:inherit;
    }
    .eye-btn,.text-btn{
      border:0;background:transparent;cursor:pointer;color:#9a6579;font-weight:900;font-family:inherit;
    }
    .login-btn,.face-btn,.role-btn{
      width:100%;border:0;border-radius:20px;
      padding:15px 16px;
      font-size:17px;font-weight:900;
      cursor:pointer;font-family:inherit;
      transition:.15s transform ease,.15s filter ease;
    }
    .login-btn:active,.face-btn:active,.role-btn:active{transform:scale(.985)}
    .login-btn{margin-top:16px;color:white;background:linear-gradient(135deg,var(--pink),var(--pink2));box-shadow:0 12px 24px rgba(239,111,159,.24)}
    .face-btn{margin-top:12px;color:white;background:linear-gradient(135deg,#52addd,#80ccf0);box-shadow:0 12px 24px rgba(82,173,221,.22)}
    .login-options{display:flex;justify-content:space-between;align-items:center;margin-top:12px;color:#846b75;font-size:14px;font-weight:800}
    .login-options label{display:flex;align-items:center;gap:5px}.login-options input{width:auto}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0 4px;color:#987686;font-size:13px;font-weight:900}
    .divider:before,.divider:after{content:"";height:1px;background:#f0c8d8;flex:1}
    footer{text-align:center;color:#78909b;font-size:12px;font-weight:800;line-height:1.6}footer span{color:#9aaeb7}
    .toast{
      position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(120px);
      width:min(92%,420px);background:#3f5360;color:white;border-radius:20px;
      padding:14px 16px;box-shadow:0 18px 38px rgba(0,0,0,.22);
      font-weight:850;line-height:1.45;transition:.25s ease;z-index:40;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
    .modal-mask{position:fixed;inset:0;background:rgba(39,35,44,.38);display:none;align-items:flex-end;justify-content:center;padding:16px;z-index:35}.modal-mask.show{display:flex}
    .sheet{width:min(100%,430px);background:white;border-radius:28px;padding:18px;box-shadow:0 24px 55px rgba(0,0,0,.25)}
    .sheet h2{margin:0 0 7px;color:#5a4050;font-size:22px}.sheet p{margin:0 0 14px;color:#758b96;font-weight:800;line-height:1.5}
    .role-list{display:grid;gap:10px}.role-btn{text-align:left;color:#314753;background:#f8fcff;border:1px solid #d7edf8}.role-btn.admin{background:#eef9ff;border-color:#bfe8fb}.role-btn.teacher{background:#fff1f7;border-color:#f4bfd4}.role-btn.support{background:#f0fff6;border-color:#bfe8ce}.role-btn span{display:block;margin-top:4px;color:#78909b;font-size:13px;font-weight:800}.close-btn{margin-top:12px;width:100%;border:0;border-radius:18px;padding:13px;background:#f3f7fa;color:#647d89;font-weight:900;font-family:inherit;cursor:pointer}
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="logo-area">
      <div class="logo-wrap" id="logoWrap">
        <img src="assets/logo.png" alt="Heremay 和美智慧校園 Logo" class="logo-img" onerror="document.getElementById('logoWrap').classList.add('no-img')" />
        <div class="castle-fallback">🏰</div>
      </div>
      <h2 class="school-name">和美智慧校園</h2>
      <p class="school-sub">Heremay Smart Campus</p>
    </section>

    <section class="login-card">
      <h1>♡ 歡迎回到和美大家庭！</h1>

      <div class="input-box">
        <span class="icon">👤</span>
        <input id="account" type="text" placeholder="帳號 / 員工編號" autocomplete="username" />
      </div>

      <div class="input-box">
        <span class="icon">🔒</span>
        <input id="password" type="password" placeholder="密碼" autocomplete="current-password" />
        <button class="eye-btn" type="button" onclick="togglePassword()">◡</button>
      </div>

      <button class="login-btn" type="button" onclick="demoLogin()">登入 →</button>

      <div class="login-options">
        <label><input type="checkbox" checked /> 記住我</label>
        <button type="button" class="text-btn" onclick="showToast('正式版會交由管理者協助重設密碼')">忘記密碼？</button>
      </div>

      <div class="divider">其他登入方式</div>

      <button class="face-btn" type="button" onclick="faceLogin()">😊 刷臉登入</button>
    </section>

    <footer>
      🛡️ 資料安全・隱私保護・安心使用<br />
      <span>Heremay Smart Campus v1.0 Prototype</span>
    </footer>
  </main>

  <div id="toast" class="toast"></div>

  <div class="modal-mask" id="faceModal" onclick="closeFaceModal(event)">
    <section class="sheet" onclick="event.stopPropagation()">
      <h2>😊 模擬刷臉成功</h2>
      <p>目前先用測試身分切換。正式版會由刷臉結果自動判斷身分。</p>
      <div class="role-list">
        <button class="role-btn admin" onclick="goRole('admin')">👑 行政主管首頁<span>謝子元／吳玉瑩園長／謝秉儒主任</span></button>
        <button class="role-btn teacher" onclick="goRole('teacher')">👩‍🏫 教保人員首頁<span>老師、助教與班級工作台</span></button>
        <button class="role-btn support" onclick="goRole('support')">🧹 庶務人員首頁<span>廚工、清潔與園務支援</span></button>
      </div>
      <button class="close-btn" onclick="hideFaceModal()">取消</button>
    </section>
  </div>

  <script>
    const routes = {
      admin:'admin.html',
      teacher:'teacher.html',
      support:'support.html'
    };

    const accountRoleMap = {
      'jack':'admin','jack159966':'admin','謝子元':'admin','子元':'admin','園長':'admin','吳玉瑩':'admin','玉瑩':'admin','主任':'admin','謝秉儒':'admin','秉儒':'admin','admin':'admin','001':'admin',
      'teacher':'teacher','teacher01':'teacher','老師':'teacher','教保':'teacher','教保人員':'teacher','002':'teacher',
      'support':'support','support01':'support','庶務':'support','庶務人員':'support','廚工':'support','清潔':'support','清潔人員':'support','003':'support'
    };

    function togglePassword(){
      const p=document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function demoLogin(){
      const account=document.getElementById('account').value.trim();
      const role=accountRoleMap[account];
      if(role){
        goRole(role);
        return;
      }
      showToast('請輸入測試帳號：jack / teacher / support，或直接按「刷臉登入」選擇身分。');
    }

    function faceLogin(){
      document.getElementById('faceModal').classList.add('show');
    }

    function hideFaceModal(){
      document.getElementById('faceModal').classList.remove('show');
    }

    function closeFaceModal(e){
      if(e.target.id==='faceModal') hideFaceModal();
    }

    function goRole(role){
      window.location.href = routes[role];
    }

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.remove('show');
      void t.offsetWidth;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3200);
    }
  </script>
</body>
</html>
